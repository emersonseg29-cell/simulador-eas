<script>
    let modo = 'IND';

    const CUPOM_OFICIAL = 'EASVIP';

    // REGRA COMERCIAL FINAL DEFINIDA POR VOCÊ
    const PLANOS = {
        bronze: { nome: 'Bronze', capital: 50000, renda: 3000 },
        prata:  { nome: 'Prata',  capital: 100000, renda: 5000 },
        ouro:   { nome: 'Ouro',   capital: 150000, renda: 10000 },
        top:    { nome: 'Top',    capital: 200000, renda: 12000 }
    };

    // BASE TEMPORÁRIA
    // Ideal: substituir depois pela tabela completa por idade
    const DATABASE = {
        bronze: {
            normal: { 16: 126.00, 35: 137.42, 43: 145.00, 53: 146.00 },
            call08: { 16: 75.00,  35: 81.33,  43: 88.14,  53: 92.43 }
        },
        prata: {
            normal: { 16: 211.13, 35: 231.04, 43: 268.34, 53: 359.12 },
            call08: { 16: 124.95, 35: 136.74, 43: 158.81, 53: 228.38 }
        },
        ouro: {
            normal: { 16: 365.30, 35: 400.87, 43: 449.48, 53: 521.69 },
            call08: { 16: 216.19, 35: 237.24, 43: 260.50, 53: 310.00 }
        },
        top: {
            normal: { 16: 430.00, 35: 472.00, 43: 525.00, 53: 610.00 },
            call08: { 16: 255.00, 35: 282.00, 43: 315.00, 53: 372.00 }
        }
    };

    function abrirSimulador(tipo) {
        modo = tipo;
        document.getElementById('simulador').style.display = 'block';
        document.getElementById('form-ind').style.display = tipo === 'IND' ? 'block' : 'none';
        document.getElementById('form-emp').style.display = tipo === 'EMP' ? 'block' : 'none';
        document.getElementById('container-cnpj').style.display = tipo === 'EMP' ? 'block' : 'none';
        document.getElementById('sim-title').innerText = tipo === 'IND' ? 'Proteção Individual' : 'Proteção Empresarial';
        document.getElementById('resultado').style.display = 'none';
    }

    function formatMoney(valor) {
        return valor.toLocaleString('pt-BR', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }

    function obterFaixaIdade(idade, tabela) {
        const idades = Object.keys(tabela).map(Number).sort((a, b) => a - b);

        let faixaEscolhida = idades[0];
        for (const faixa of idades) {
            if (idade >= faixa) {
                faixaEscolhida = faixa;
            }
        }
        return faixaEscolhida;
    }

    function gerarEstudo() {
        const nome = document.getElementById('nome').value.trim();
        const whats = document.getElementById('whatsapp').value.replace(/\D/g, '');

        if (!nome || whats.length < 11) {
            alert('Preencha nome e WhatsApp corretamente.');
            return;
        }

        let html = '';
        let msg = '';
        let preco = 0;

        if (modo === 'IND') {
            const idade = parseInt(document.getElementById('idade').value, 10);
            const planoKey = document.getElementById('planoInd').value;
            const cupom = document.getElementById('cupom').value.trim().toUpperCase();

            if (isNaN(idade) || idade < 16 || idade > 70) {
                alert('Idade permitida: 16 a 70 anos.');
                return;
            }

            const plano = PLANOS[planoKey];
            if (!plano) {
                alert('Plano inválido.');
                return;
            }

            const usarTabelaCall08 = cupom === CUPOM_OFICIAL;
            const tabelaSelecionada = usarTabelaCall08
                ? DATABASE[planoKey].call08
                : DATABASE[planoKey].normal;

            const faixaIdade = obterFaixaIdade(idade, tabelaSelecionada);
            preco = tabelaSelecionada[faixaIdade];

            const cap = plano.capital;
            const renda = plano.renda;
            const diaria = renda / 30;
            const exemplo60Dias = diaria * 53;

            const valorNormal = DATABASE[planoKey].normal[obterFaixaIdade(idade, DATABASE[planoKey].normal)];
            const economia = Math.max(valorNormal - preco, 0);

            const blocoBeneficio = usarTabelaCall08
                ? `<div class="info-card" style="background:#eff6ff;border-left-color:#2563eb;">
                        <h4><i class="fas fa-ticket-alt"></i> Benefício Comercial Aplicado</h4>
                        <p><b>Cupom aplicado:</b> ${CUPOM_OFICIAL}<br>
                        <b>Valor oficial:</b> R$ ${formatMoney(valorNormal)}<br>
                        <b>Valor com benefício EAS:</b> R$ ${formatMoney(preco)}<br>
                        <b>Economia estimada:</b> R$ ${formatMoney(economia)}</p>
                    </div>`
                : '';

            html = `
                ${blocoBeneficio}

                <div class="info-card">
                    <h4><i class="fas fa-file-invoice-dollar"></i> Capitais Segurados Unimed</h4>
                    <p>
                        Seu estudo ficou da seguinte forma:<br>
                        Se ocorrer <b>morte natural</b> a Seguros Unimed pagará uma indenização no valor de <b>R$ ${cap.toLocaleString('pt-BR')}</b>.<br>
                        Se ocorrer <b>morte por acidente</b>, a Seguros Unimed pagará uma indenização no valor de <b>R$ ${(cap * 2).toLocaleString('pt-BR')}</b>.<br>
                        Se ocorrer uma <b>invalidez por acidente ou doença</b>, a Seguros Unimed pagará uma indenização no valor de <b>R$ ${cap.toLocaleString('pt-BR')}</b>.
                    </p>
                </div>

                <div class="info-card">
                    <h4><i class="fas fa-hand-holding-medical"></i> SERIT (Renda Mensal)</h4>
                    <p>
                        Se você ficar doente ou sofrer um acidente e precisar ficar afastado por mais de 7 dias,
                        a Seguros Unimed pagará uma renda de <b>R$ ${renda.toLocaleString('pt-BR')}</b> por mês.
                        A indenização é paga por dia de afastamento.
                    </p>

                    <div class="calc-box">
                        Para saber o valor exato da indenização você fará o seguinte cálculo:<br><br>
                        Valor do benefício mensal <b>R$ ${renda.toLocaleString('pt-BR')}</b> dividido por 30 dias
                        = <b>R$ ${formatMoney(diaria)} por dia</b>.<br><br>
                        Exemplo de afastamento de 60 dias:<br>
                        descontando a franquia de 7 dias, a indenização estimada será de <b>R$ ${formatMoney(exemplo60Dias)}</b>.
                    </div>

                    <p style="font-size: 0.8rem; color: #64748b;">
                        <i>Carências para doenças comuns: 30 dias. LER, DORT, LTC, doenças progressivas, degenerativas e hérnias: 180 dias. Acidente isento.</i>
                    </p>
                </div>
            `;

            msg =
`Olá ${nome.toUpperCase()}, seu estudo ficou pronto.

Plano: ${plano.nome}
Capital segurado: R$ ${cap.toLocaleString('pt-BR')}
SERIT mensal: R$ ${renda.toLocaleString('pt-BR')}
Valor mensal: R$ ${formatMoney(preco)}

Posso te explicar as coberturas e avançar com a proposta.`;

        } else {
            const vidas = parseInt(document.getElementById('vidas').value, 10);
            const p = document.getElementById('planoEmp').value.split('|');

            if (isNaN(vidas) || vidas < 3) {
                alert('Informe no mínimo 3 colaboradores.');
                return;
            }

            const valorPorVida = parseFloat(p[0]);
            const cap = parseInt(p[1], 10);
            const renda = parseInt(p[2], 10);

            preco = valorPorVida * vidas;

            const diariaEmp = renda / 30;
            const liqEmp = diariaEmp * 45;

            html = `
                <div class="info-card">
                    <h4><i class="fas fa-building"></i> Proposta Vida em Grupo</h4>
                    <p>
                        <b>Grupo segurado:</b> funcionários e prestadores com contrato.<br><br>
                        Se ocorrer <b>morte natural</b> a Seguros Unimed pagará uma indenização no valor de <b>R$ ${cap.toLocaleString('pt-BR')}</b>.<br>
                        Se ocorrer <b>morte por acidente</b>, a Seguros Unimed pagará uma indenização no valor de <b>R$ ${(cap * 2).toLocaleString('pt-BR')}</b>.<br>
                        Se ocorrer uma <b>invalidez por acidente ou doença</b>, a Seguros Unimed pagará uma indenização no valor de <b>R$ ${cap.toLocaleString('pt-BR')}</b>.
                    </p>
                </div>

                <div class="info-card">
                    <h4><i class="fas fa-ambulance"></i> Cobertura DIT (Acidente)</h4>
                    <p>
                        Se ocorrer um acidente e o colaborador precisar ficar afastado por mais de 15 dias,
                        a Seguros Unimed pagará uma renda no valor de <b>R$ ${renda.toLocaleString('pt-BR')}</b> por mês.
                        A indenização é paga por dia de afastamento.
                    </p>

                    <div class="calc-box">
                        <strong>Cálculo do benefício equipe:</strong><br>
                        Valor mensal R$ ${renda.toLocaleString('pt-BR')} ÷ 30 dias = <b>R$ ${formatMoney(diariaEmp)} por dia</b>.<br>
                        Exemplo de afastamento de 60 dias: descontando a franquia de 15 dias, o total estimado é de <b>R$ ${formatMoney(liqEmp)}</b>.
                    </div>

                    <p style="font-size: 0.85rem;">
                        <i>O seguro DIT não cobre afastamento por doenças. Afastamento por acidente não tem carência.</i>
                    </p>
                </div>

                <div class="info-card" style="background: #f8fafc; border-left-color: #b89b3e;">
                    <h4><i class="fas fa-star"></i> Vantagens para a Empresa</h4>
                    <ul style="padding-left: 20px;">
                        <li><b>Legislação:</b> adequação ao Art. 7º, inciso XXVIII, da Constituição Federal.</li>
                        <li><b>Segurança jurídica:</b> proteção financeira em eventos cobertos.</li>
                        <li><b>Sem DPS:</b> não precisa preencher declaração de saúde.</li>
                        <li><b>Custo fixo:</b> não aumenta conforme a idade.</li>
                        <li><b>Correção monetária:</b> atualização conforme regras da apólice.</li>
                    </ul>
                </div>
            `;

            msg =
`Olá ${nome.toUpperCase()}, sua proposta empresarial ficou pronta.

Quantidade de vidas: ${vidas}
Capital segurado: R$ ${cap.toLocaleString('pt-BR')}
DIT mensal: R$ ${renda.toLocaleString('pt-BR')}
Valor mensal total: R$ ${formatMoney(preco)}

Posso te explicar as coberturas e avançar com a proposta.`;
        }

        document.getElementById('res-valor').innerText = `R$ ${formatMoney(preco)}/mês`;
        document.getElementById('res-explicacao').innerHTML = html;
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('wa-link').href = `https://wa.me/55${whats}?text=${encodeURIComponent(msg)}`;
    }
</script>
