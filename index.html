    <title>EAS Corretora - Consultoria Técnica de Renda</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --eas-blue: #0f172a; --eas-gold: #b89b3e; --unimed: #00995d; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #334155; }
        header { background: white; padding: 40px 20px; text-align: center; border-bottom: 6px solid var(--eas-gold); box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .main-logo { max-width: 500px; width: 100%; height: auto; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 25px 60px rgba(0,0,0,0.15); max-width: 800px; margin: 40px auto; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 800; color: var(--eas-blue); margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 16px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 1.1rem; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--unimed); }
        .btn-calc { width: 100%; padding: 22px; background: var(--eas-blue); color: white; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-calc:hover { background: #1e293b; }
        #resultado { display: none; margin-top: 40px; border-radius: 25px; border: 1px solid #e2e8f0; background: white; overflow: hidden; }
        .res-header { background: #f8fafc; padding: 35px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .val-total { font-size: 3.2rem; color: var(--unimed); font-weight: 900; margin: 10px 0; }
        .info-card { background: #f0fdf4; border-radius: 15px; padding: 25px; margin: 20px 30px; border-left: 6px solid var(--unimed); }
        .calc-box { background: #fffbeb; border: 1px dashed #f59e0b; padding: 20px; border-radius: 12px; margin: 20px 0; font-size: 1rem; color: #92400e; line-height: 1.6; }
        
        /* Estilo do Bloco de Blindagem Jurídica */
        .blindagem-box { margin-top: 20px; padding: 18px; background-color: #f8fafc; border-radius: 10px; border-left: 5px solid #64748b; font-size: 0.9rem; color: #475569; line-height: 1.6; }
        .blindagem-box strong { color: var(--eas-blue); display: block; margin-bottom: 10px; font-size: 1rem; }
        .blindagem-box ul { margin: 0; padding-left: 20px; }
        .blindagem-box li { margin-bottom: 6px; }

        .whatsapp-area { padding: 0 30px 30px; display: none; }
        .whatsapp-btn { background: #25d366; color:white; padding: 22px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 12px; text-decoration: none; font-weight: 900; font-size: 1.2rem; }
    </style>
</head>
<body>

<header>
    <img src="logo oficial.jpg.png" alt="EAS CORRETORA" class="main-logo">
    <div style="color: var(--eas-gold); font-weight: 700; margin-top:10px; letter-spacing: 1px;">CONSULTORIA TÉCNICA DE PROTEÇÃO DE RENDA</div>
</header>

<main class="main-content">
    <div class="card">
        <div class="input-group"><label>Nome do Proponente</label><input type="text" id="nome" placeholder="Nome Completo"></div>
        <div class="input-group"><label>WhatsApp (DDD + Número)</label><input type="tel" id="whatsapp" placeholder="Ex: 17991234567" maxlength="11"></div>
        <div class="input-group"><label>Idade Atual (16 a 70 anos)</label><input type="number" id="idade" placeholder="Ex: 35"></div>
        <div class="input-group">
            <label>Plano Escolhido</label>
            <select id="plano">
                <option value="ouro">OURO (10k Renda / 120k Vida)</option>
                <option value="prata">PRATA (5k Renda / 100k Vida)</option>
                <option value="bronze">BRONZE (3k Renda / 50k Vida)</option>
            </select>
        </div>
        <div class="input-group"><label>Código de Consultor</label><input type="text" id="cupom" placeholder="Insira UNIMED08 para desconto"></div>
        
        <button class="btn-calc" onclick="gerarSimulacao()">Gerar Estudo Técnico</button>

        <div id="resultado">
            <div class="res-header">
                <span style="font-weight: 800; color: var(--eas-blue);">INVESTIMENTO MENSAL FINAL</span>
                <div class="val-total" id="res-valor"></div>
            </div>
            <div id="res-conteudo"></div>
            <div class="whatsapp-area" id="wa-area">
                <a href="#" id="wa-link" class="whatsapp-btn" target="_blank"><i class="fab fa-whatsapp"></i> ENVIAR PELO WHATSAPP</a>
            </div>
        </div>
    </div>
</main>

    function gerarSimulacao() {
        const nome = document.getElementById('nome').value.trim();
        const idade = parseInt(document.getElementById('idade').value);
        const planoKey = document.getElementById('plano').value;
        const cupom = document.getElementById('cupom').value.toUpperCase();
        
        let whats = document.getElementById('whatsapp').value.replace(/\D/g, '');
        if (whats.length > 11) whats = whats.substring(0, 11);

        if (!nome || !idade || whats.length < 10) {
            alert("Preencha Nome, Idade e um WhatsApp válido (DDD + Número)."); return;
        }
        
        if (idade < 16 || idade > 70) {
            alert("O sistema calcula precificação atuarial apenas para idades entre 16 e 70 anos conforme Condições Gerais."); return;
        }

        const info = DATA_MAP[planoKey];
        const tabela = (cupom === "UNIMED08" || cupom === "CALL08") ? info.call08 : info.a37;
        
        let preco = tabela[idade];

        const diaria = (info.renda / 30).toLocaleString('pt-BR', {minimumFractionDigits:2});
        const liq = ((info.renda / 30) * 53).toLocaleString('pt-BR', {minimumFractionDigits:2});
        
        // Formatação em Reais para facilitar o uso no WhatsApp e no HTML
        const vPreco = preco.toLocaleString('pt-BR', {minimumFractionDigits:2});
        const vCap = info.cap.toLocaleString('pt-BR');
        const vDobra = (info.cap * 2).toLocaleString('pt-BR');
        const vRenda = info.renda.toLocaleString('pt-BR');

        // ==== RENDERIZAÇÃO NA TELA (HTML) ====

            <div class="info-card">

                <p>Seu estudo para <b>${nome.toUpperCase()}</b> ficou da seguinte forma:<br>
                Se ocorrer <b>morte natural</b> a Seguros Unimed pagará uma indenização no valor de R$ ${vCap}.<br>
                Se ocorrer <b>morte por acidente</b>, o valor dobra para <b>R$ ${vDobra}</b>.<br>
                Se ocorrer uma <b>invalidez por acidente ou doença</b> a Seguros Unimed pagará uma indenização no valor de R$ ${vCap}.</p>
            </div>

                    </ul>
                </div>
            </div>`;

💰 *INVESTIMENTO MENSAL:* R$ ${vPreco}

🛡️ *Capitais Seguros Unimed*

Se você ficar doente ou sofrer um acidente e precisar se afastar por mais de 7 dias, a Seguradora pagará uma renda de *R$ ${vRenda} por mês*.
