<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal EAS Corretora - Consultoria Técnica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --eas-blue: #0f172a; 
            --eas-gold: #b89b3e; 
            --unimed: #00995d; 
            --bg: #f1f5f9; 
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 0; 
            color: #334155; 
        }
        header { 
            background: white; 
            padding: 45px 20px; 
            text-align: center; 
            border-bottom: 6px solid var(--eas-gold); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
        }
        .main-logo { 
            max-width: 550px; 
            width: 100%; 
            height: auto; 
            margin-bottom: 15px; 
        }
        .brand-subtitle { 
            color: var(--eas-gold); 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 1.1rem; 
            margin-top: 10px; 
        }
        .selector-container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 25px; 
            max-width: 1000px; 
            margin: -35px auto 50px; 
            padding: 0 20px; 
        }
        .card-select { 
            background: white; 
            padding: 45px 30px; 
            border-radius: 25px; 
            text-align: center; 
            cursor: pointer; 
            transition: 0.4s; 
            border: 4px solid transparent; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
        }
        .card-select:hover { 
            border-color: var(--unimed); 
            transform: translateY(-10px); 
        }
        .card-select i { 
            font-size: 3.5rem; 
            color: var(--eas-blue); 
            margin-bottom: 20px; 
        }
        .card-select h3 { 
            margin: 15px 0; 
            color: var(--eas-blue); 
            font-size: 1.6rem; 
            font-weight: 800; 
        }
        .card-select.active { 
            border-color: var(--eas-gold); 
            background: #f8fafc; 
        }
        .main-content { 
            max-width: 750px; 
            margin: 0 auto 100px; 
            padding: 0 20px; 
        }
        .simulador-box { 
            background: white; 
            padding: 45px; 
            border-radius: 30px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.15); 
            display: none; 
        }
        .section-title { 
            text-align: center; 
            color: var(--eas-blue); 
            font-size: 1.8rem; 
            margin-bottom: 35px; 
            font-weight: 800; 
            border-bottom: 2px solid #e2e8f0; 
            padding-bottom: 20px; 
        }
        .input-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            font-size: 0.8rem; 
            font-weight: 800; 
            color: var(--eas-blue); 
            margin-bottom: 8px; 
            text-transform: uppercase; 
        }
        input, select { 
            width: 100%; 
            padding: 16px; 
            border: 2px solid #cbd5e1; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            box-sizing: border-box; 
            outline: none; 
        }
        .btn-calc { 
            width: 100%; 
            padding: 22px; 
            background: var(--eas-blue); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.2rem; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
        }
        #resultado { 
            display: none; 
            margin-top: 40px; 
            border-radius: 25px; 
            overflow: hidden; 
            border: 1px solid #e2e8f0; 
            background: white; 
        }
        .res-header { 
            background: #f8fafc; 
            padding: 35px; 
            text-align: center; 
            border-bottom: 1px solid #e2e8f0; 
        }
        .val-total { 
            font-size: 3.2rem; 
            color: var(--unimed); 
            font-weight: 900; 
            margin: 10px 0; 
        }
        .res-body { 
            padding: 30px; 
        }
        .info-card { 
            background: #f0fdf4; 
            border-radius: 15px; 
            padding: 25px; 
            margin-bottom: 20px; 
            border-left: 6px solid var(--unimed); 
        }
        .info-card h4 { 
            margin: 0 0 12px; 
            color: var(--eas-blue); 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-size: 1rem; 
            text-transform: uppercase; 
        }
        .info-card p { 
            margin: 8px 0; 
            font-size: 1rem; 
            line-height: 1.7; 
            color: #1e293b; 
            text-align: justify; 
        }
        .calc-box { 
            background: #fffbeb; 
            border: 1px dashed #f59e0b; 
            padding: 20px; 
            border-radius: 12px; 
            margin: 20px 0; 
            font-size: 1rem; 
            line-height: 1.7; 
            color: #92400e; 
        }
        .whatsapp-btn { 
            background: #25d366; 
            color:white; 
            padding: 22px; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 1.1rem; 
            margin: 20px 30px 40px; 
        }
    </style>
</head>
<body>

<header>
    <img src="logo oficial.jpg.png" alt="EAS CORRETORA DE SEGUROS" class="main-logo">
    <div class="brand-subtitle">EAS CORRETORA DE SEGUROS • Proteção de Renda e Vida</div>
</header>

<section class="selector-container">
    <div class="card-select" id="cardInd" onclick="abrirSimulador('IND')">
        <i class="fas fa-user-shield"></i>
        <h3>Individual</h3>
        <p>Autônomos e Liberais</p>
    </div>
    <div class="card-select" id="cardEmp" onclick="abrirSimulador('EMP')">
        <i class="fas fa-building"></i>
        <h3>Empresarial</h3>
        <p>Seguro em Grupo para Empresas</p>
    </div>
</section>

<main class="main-content">
    <div id="simulador" class="simulador-box">
        <div class="section-title" id="sim-title">Estudo Personalizado</div>
        <div class="input-group">
            <label id="labelNome">Nome / Razão Social</label>
            <input type="text" id="nome" placeholder="Digite aqui">
        </div>
        <div class="input-group" id="container-cnpj" style="display:none;">
            <label>CNPJ da Empresa</label>
            <input type="text" id="cnpj" placeholder="00.000.000/0000-00">
        </div>
        <div class="input-group">
            <label>WhatsApp do Cliente</label>
            <input type="tel" id="whatsapp" placeholder="(17) 99999-9999">
        </div>

        <div id="form-ind">
            <div class="input-group">
                <label>Idade (16 a 70 anos)</label>
                <input type="number" id="idade" placeholder="Ex: 35">
            </div>
            <div class="input-group">
                <label>Plano Escolhido</label>
                <select id="planoInd">
                    <option value="50000|3000">Bronze: Renda 3k | Capital 50k</option>
                    <option value="100000|5000">Prata: Renda 5k | Capital 100k</option>
                    <option value="120000|10000" selected>Ouro: Renda 10k | Capital 120k</option>
                </select>
            </div>
            <div class="input-group">
                <label>Código Consultor</label>
                <input type="text" id="cupom" placeholder="Ex: UNIMED08">
            </div>
        </div>

        <div id="form-emp" style="display:none;">
            <div class="input-group">
                <label>Nº de Colaboradores (Mínimo 3)</label>
                <input type="number" id="vidas" value="3">
            </div>
            <div class="input-group">
                <label>Plano Sugerido</label>
                <select id="planoEmp">
                    <option value="49.90|50000|2000">Bronze: R$ 50k Vida | R$ 2k DIT</option>
                    <option value="69.90|100000|2500">Prata: R$ 100k Vida | R$ 2.5k DIT</option>
                    <option value="79.90|100000|3000">Ouro: R$ 100k Vida | R$ 3k DIT</option>
                </select>
            </div>
        </div>

        <button class="btn-calc" onclick="gerarEstudo()">Gerar Estudo Técnico</button>

        <div id="resultado">
            <div class="res-header">
                <span style="font-size: 0.85rem; font-weight: 800; color: var(--eas-blue);">INVESTIMENTO MENSAL CONSULTORIA</span>
                <div class="val-total" id="res-valor"></div>
            </div>
            <div class="res-body" id="res-explicacao"></div>
            <a href="#" id="wa-link" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> ENVIAR CONSULTORIA AO WHATSAPP</a>
        </div>
    </div>
</main>

<script>
    let modo = 'IND';
    
    // TABELA DEFINITIVA EXTRAÍDA DOS SEUS DOCUMENTOS OFICIAIS
    const DATABASE = {
        ouro: { 
            normal: { 16: 365.30, 35: 400.87, 43: 389.48, 53: 521.69 }, 
            call08: { 16: 216.19, 35: 237.24, 43: 230.50, 50: 310.00 } 
        },
        prata: { 
            normal: { 16: 211.13, 35: 231.04, 43: 268.34, 53: 359.12 }, 
            call08: { 16: 124.95, 35: 124.95, 43: 158.81, 50: 228.38 } 
        },
        bronze: { 
            normal: { 16: 126.00, 35: 137.42, 43: 105.00, 53: 146.00 }, 
            call08: { 16: 75.00, 35: 81.33, 43: 62.14, 50: 92.43 } 
        }
    };

    function abrirSimulador(tipo) {
        modo = tipo;
        document.getElementById('simulador').style.display = 'block';
        document.getElementById('form-ind').style.display = tipo === 'IND' ? 'block' : 'none';
        document.getElementById('form-emp').style.display = tipo === 'EMP' ? 'block' : 'none';
        document.getElementById('container-cnpj').style.display = tipo === 'EMP' ? 'block' : 'none';
        document.getElementById('sim-title').innerText = tipo === 'IND' ? 'Proteção Individual' : 'Proteção Empresarial';
        document.getElementById('resultado').style.display = 'none';
    }

    function gerarEstudo() {
        const nome = document.getElementById('nome').value.trim();
        const whats = document.getElementById('whatsapp').value.replace(/\D/g, '');
        if (!nome || whats.length < 11) { alert("Preencha Nome e WhatsApp."); return; }

        let html, msg, preco;

        if (modo === 'IND') {
            const idade = parseInt(document.getElementById('idade').value);
            if (idade < 16 || idade > 70 || isNaN(idade)) { alert("Idade permitida: 16 a 70 anos."); return; }
            
            const p = document.getElementById('planoInd').value.split('|');
            const cap = parseInt(p[0]); 
            const renda = parseInt(p[1]);
            const cupom = document.getElementById('cupom').value.toUpperCase();
            
            const planoKey = cap === 120000 ? 'ouro' : (cap === 100000 ? 'prata' : 'bronze');
            const tabela = cupom === "UNIMED08" ? DATABASE[planoKey].call08 : DATABASE[planoKey].normal;
            
            // Busca o valor exato na matriz de acordo com as Condições Gerais de reajuste técnico
            const keys = Object.keys(tabela).map(Number).sort((a,b) => b-a);
            const match = keys.find(k => idade >= k) || keys[keys.length-1];
            preco = tabela[match];

            const diaria = (renda/30).toLocaleString('pt-BR', {minimumFractionDigits:2});
            const liq = ((renda/30)*53).toLocaleString('pt-BR', {minimumFractionDigits:2});

            // CERNE EXPLICATIVO INDIVIDUAL (IDENTICO AO ORIGINAL)
            html = `<div class="info-card"><h4><i class="fas fa-file-invoice-dollar"></i> Capitais Seguros Unimed</h4><p>Seu estudo ficou da seguinte forma:<br>Se ocorrer <b>morte natural</b> a Seguros Unimed pagará uma indenização no valor de R$ ${cap.toLocaleString('pt-BR')}.<br>Se ocorrer <b>morte por acidente</b>, a Seguros Unimed pagará uma indenização no valor de <b>R$ ${(cap*2).toLocaleString('pt-BR')}</b>.<br>Se ocorrer uma <b>invalidez por acidente ou doença</b> a Seguros Unimed pagará uma indenização no valor de R$ ${cap.toLocaleString('pt-BR')}.</p></div><div class="info-card"><h4><i class="fas fa-hand-holding-medical"></i> SERIT (Renda Mensal)</h4><p>Se você ficar doente ou sofrer um acidente e precisar ficar afastado por mais de 7 dias a Seguros Unimed pagará uma renda de R$ ${renda.toLocaleString('pt-BR')} por mes. A indenização é paga por dia de afastamento.</p><div class="calc-box">Para saber o valor exato da indenizaçao voce fara o seguinte calculo: Valor do beneficio mensal R$ ${renda.toLocaleString('pt-BR')} dividido por 30 dias <i>"por que a seguradora paga por dia de afastamento"</i> <b>R$ ${diaria} por dia</b>. Em seguida voce multiplica a diaria pelos dias de afastamento descontando a franquia de 7 dias total <b>R$ ${liq}</b>.</div><p style="font-size: 0.8rem; color: #64748b;"><i>Carencias para doenças comuns 30 dias. LER, DORT, LTC, DOENÇAS PROGRESSIVAS, DEGENERATIVAS, HERNIAS 180 dias. Acidente isento.</i></p></div>`;
            msg = `Olá ${nome.toUpperCase()}, seu estudo individual pronto!\n💰 Total: R$ ${preco.toLocaleString('pt-BR', {minimumFractionDigits:2})}/mês`;
        } else {
            const vidas = parseInt(document.getElementById('vidas').value);
            const p = document.getElementById('planoEmp').value.split('|');
            preco = parseFloat(p[0]) * vidas;
            const cap = parseInt(p[1]); const renda = parseInt(p[2]);
            const diariaEmp = (renda/30).toLocaleString('pt-BR', {minimumFractionDigits:2});
            const liqEmp = ((renda/30)*45).toLocaleString('pt-BR', {minimumFractionDigits:2});

            // CERNE EXPLICATIVO EMPRESARIAL (IDENTICO AO ORIGINAL)
            html = `<div class="info-card"><h4><i class="fas fa-building"></i> Proposta Vida em Grupo</h4><p><b>Grupo Segurado:</b> Funcionários e prestadores com contrato.<br><br>Se ocorrer <b>morte natural</b> a Seguros Unimed pagará uma indenização no valor de R$ ${cap.toLocaleString('pt-BR')}.<br>Se ocorrer <b>morte por acidente</b>, a Seguros Unimed pagará uma indenização no valor de <b>R$ ${(cap*2).toLocaleString('pt-BR')}</b>.<br>Se ocorrer uma <b>invalidez por acidente ou doença</b> a Seguros Unimed pagará uma indenização no valor de R$ ${cap.toLocaleString('pt-BR')}.</p></div><div class="info-card"><h4><i class="fas fa-ambulance"></i> Cobertura DIT (Acidente)</h4><p>Se ocorrer um acidente e o colaborador precisar ficar afastado por mais de 15 dias a Seguros Unimed pagará uma renda no valor de R$ ${renda.toLocaleString('pt-BR')} por mes. A indenização é paga por dia de afastamento.</p><div class="calc-box"><strong>Cálculo do Benefício Equipe:</strong><br>Valor mensal R$ ${renda.toLocaleString('pt-BR')} ÷ 30 dias = <b>R$ ${diariaEmp} por dia</b>. Suponhamos um atestado de 60 dias: descontando a franquia de 15 dias, o total é de <b>R$ ${liqEmp}</b>.</div><p style="font-size: 0.85rem;"><i>*O seguro DIT nao cobre afastamento por doenças. Afastamento por Acidente nao tem carencia.</i></p></div><div class="info-card" style="background: #f8fafc; border-left-color: var(--gold);"><h4><i class="fas fa-star"></i> Vantagens para a Empresa</h4><ul style="padding-left: 20px;"><li><b>Legislação:</b> Adequação ao Art. 7° inciso XVIII CF.</li><li><b>Segurança Jurídica:</b> Proteção contra indenizações por acidente de trabalho.</li><li><b>Sem DPS:</b> Não precisa preencher declaração de saúde.</li><li><b>Custo Fixo:</b> Não aumenta conforme a idade.</li><li><b>Correção Monetária IPCA:</b> Capital Segurado e o Prêmio.</li></ul></div>`;
            msg = `Olá ${nome.toUpperCase()}, proposta empresarial EAS Corretora: R$ ${preco.toLocaleString('pt-BR', {minimumFractionDigits:2})}/mês`;
        }
        document.getElementById('res-valor').innerText = `R$ ${preco.toLocaleString('pt-BR', {minimumFractionDigits:2})}/mês`;
        document.getElementById('res-explicacao').innerHTML = html;
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('wa-link').href = `https://wa.me/55${whats}?text=${encodeURIComponent(msg)}`;
    }
</script>
</body>
</html>
