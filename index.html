<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAS Corretora - Simulador SERIT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1d2d44; --gold: #b89b3e; --unimed: #00995d; --text: #334155; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: #ffffff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .header-logos { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .logo-img-header { 
            width: auto; 
            max-width: 160px; 
            height: auto; 
            max-height: 90px; 
            object-fit: contain; 
        }
        .divider-logos { width: 2px; height: 50px; background-color: #e2e8f0; }

        h2 { color: var(--primary); text-align: center; margin: 0; font-size: 1.4rem; }
        .sub { color: var(--unimed); text-align: center; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px; }
        
        .type-selector { display: flex; background: #e2e8f0; border-radius: 12px; padding: 5px; margin-bottom: 25px; }
        .type-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; color: #64748b; background: transparent; transition: 0.3s; }
        .type-btn.active { background: var(--primary); color: white; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 5px; }
        input, select { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; box-sizing: border-box; outline: none; }
        .btn-calc { width: 100%; padding: 20px; background: var(--unimed); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 153, 93, 0.3); }
        #areaSimulacao { display: none; margin-top: 30px; border-top: 2px dashed #eee; padding-top: 20px; }
        .pdf-content { padding: 25px; border-radius: 15px; background: #fff; line-height: 1.6; font-size: 0.95rem; border: 1px solid #eee; }
        .resumo-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .resumo-table td { padding: 10px; border-bottom: 1px solid #f1f5f9; color: #475569; }
        .val-destaque { font-weight: 800; color: var(--unimed); }
        .highlight-box { background: #f0fdf4; padding: 20px; border-radius: 12px; margin: 15px 0; border-left: 5px solid var(--unimed); font-size: 0.9rem; text-align: justify; white-space: pre-wrap;}
        .action-buttons { display: grid; gap: 10px; margin-top: 20px; }
        .btn-action { padding: 18px; border-radius: 12px; text-decoration: none; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.95rem; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-logos">
        <img src="logo oficial.jpg.png" class="logo-img-header" alt="EAS Corretora">
        <div class="divider-logos"></div>
        <img src="logo-unimed.png" class="logo-img-header" alt="Seguros Unimed">
    </div>
    <h2>EAS CORRETORA</h2>
    <div class="sub">Simulador SERIT</div>

    <div class="type-selector">
        <button class="type-btn active" id="btnInd" onclick="switchType('IND')">INDIVIDUAL (CPF)</button>
        <button class="type-btn" id="btnEmp" onclick="switchType('EMP')">EMPRESARIAL (PJ)</button>
    </div>

    <div id="formInd">
        <div class="input-group"><label>Nome do Cliente</label><input type="text" id="nomeInd" placeholder="Nome Completo"></div>
        <div class="input-group"><label>WhatsApp do Cliente</label><input type="tel" id="whatsInd" placeholder="(17) 99999-9999"></div>
        <div class="input-group"><label>Idade (14 a 70 anos)</label><input type="number" id="idadeInd" placeholder="Ex: 43"></div>
        <div class="input-group">
            <label>Plano de Proteção</label>
            <select id="planoInd">
                <option value="bronze">plano bronze 3 mil renda</option>
                <option value="prata">plano prata 5 mil renda</option>
                <option value="ouro" selected>plano ouro 10 mil renda</option>
            </select>
        </div>
        <div class="input-group"><label>Cupom de Desconto</label><input type="text" id="cupomInd" placeholder="Opcional"></div>
    </div>

    <div id="formEmp" style="display:none;">
        <div class="input-group"><label>Nome do Colaborador / Empresa</label><input type="text" id="nomeEmp" placeholder="Nome Completo"></div>
        <div class="input-group"><label>WhatsApp</label><input type="tel" id="whatsEmp" placeholder="(17) 99999-9999"></div>
        <div class="input-group"><label>Nº de Vidas</label><input type="number" id="vidasEmp" value="3"></div>
        <div class="input-group">
            <label>Plano Empresarial</label>
            <select id="planoEmp">
                <option value="49.90|50000">plano bronze 3 mil renda</option>
                <option value="69.90|100000">plano prata 5 mil renda</option>
                <option value="79.90|120000">plano ouro 10 mil renda</option>
            </select>
        </div>
    </div>

    <button class="btn-calc" onclick="gerarSimulacao()">GERAR ESTUDO TÉCNICO</button>

    <div id="areaSimulacao">
        <div id="pdfArea" class="pdf-content">
            <div id="resCabecalho" style="text-align:center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px;"></div>
            <table class="resumo-table"><tbody id="listaCoberturas"></tbody></table>
            <div id="resTexto"></div>
            <div id="resPreco" style="text-align:right; font-weight:800; font-size:1.4rem; border-top: 2px solid #eee; padding-top:15px; margin-top:20px;"></div>
        </div>
        <div class="action-buttons">
            <button id="btnEnviarCliente" class="btn-action" onclick="enviarSimulacaoWhatsApp()" style="background: var(--gold); color: white; display: none;">ENVIAR PARA O CLIENTE</button>
            <a href="#" id="linkConsultor" class="btn-action" style="background: #e2e8f0; color: var(--primary);" target="_blank"><i class="fa-solid fa-user-tie"></i> FALAR COM CONSULTOR</a>
        </div>
    </div>
</div>

<script>
    function calcularValor(idade, plano, temCupom) {
        const baseNormal = { ouro: 521.71, prata: 286.94, bronze: 162.83 };
        const baseDesconto = { ouro: 308.75, prata: 170.31, bronze: 96.66 };
        let valorReferencia = temCupom ? baseDesconto[plano] : baseNormal[plano];
        let diffAnos = idade - 43;
        let fatorEtario = Math.pow(1.055, diffAnos);
        if (idade >= 60) fatorEtario *= 1.12;
        if (idade >= 66) fatorEtario *= 1.10;
        return valorReferencia * fatorEtario;
    }

    let modo = 'IND';
    let isEquipe = window.location.search.includes('equipe');
    if(isEquipe) { document.getElementById('btnEnviarCliente').style.display = 'block'; }

    function switchType(type) {
        modo = type;
        document.getElementById('btnInd').classList.toggle('active', type === 'IND');
        document.getElementById('btnEmp').classList.toggle('active', type === 'EMP');
        document.getElementById('formInd').style.display = type === 'IND' ? 'block' : 'none';
        document.getElementById('formEmp').style.display = type === 'EMP' ? 'block' : 'none';
        document.getElementById('areaSimulacao').style.display = 'none';
    }

    function gerarSimulacao() {
        let nome, precoFinal, capMorte, capRenda, tabelaHtml, explicacaoHtml;
        if (modo === 'IND') {
            nome = document.getElementById('nomeInd').value.trim();
            let idade = parseInt(document.getElementById('idadeInd').value);
            let plano = document.getElementById('planoInd').value;
            let cupom = document.getElementById('cupomInd').value.trim().toUpperCase();
            if(!nome || isNaN(idade)) { alert("Preencha Nome e Idade."); return; }
            let valorCalculado = calcularValor(idade, plano, cupom === "UNIMED08");
            capRenda = (plano === 'bronze' ? 3000 : plano === 'prata' ? 5000 : 10000);
            capMorte = (plano === 'bronze' ? 50000 : plano === 'prata' ? 100000 : 120000);
            let vMorte = `R$ ${capMorte.toLocaleString('pt-BR')},00`;
            let vMorteAc = `R$ ${(capMorte*2).toLocaleString('pt-BR')},00`;
            let vRenda = `R$ ${capRenda.toLocaleString('pt-BR')},00`;
            let vDiaria = (capRenda / 30).toLocaleString('pt-BR', {minimumFractionDigits: 2});
            let vTotal60 = ((capRenda / 30) * 53).toLocaleString('pt-BR', {minimumFractionDigits: 2});
            precoFinal = `INVESTIMENTO: R$ ${valorCalculado.toFixed(2)}/mês`;
            tabelaHtml = `<tr><td>Morte Natural</td><td class="val-destaque">${vMorte}</td></tr><tr><td>Morte por Acidente</td><td class="val-destaque">${vMorteAc}</td></tr><tr><td>Invalidez por Acidente ou Doença</td><td class="val-destaque">${vMorte}</td></tr><tr><td>Renda Mensal (SERIT)</td><td class="val-destaque">${vRenda}</td></tr>`;
            explicacaoHtml = `<div class="highlight-box">Seu estudo ficou da seguinte forma: Se ocorrer <b>morte natural</b> a Seguros Unimed pagará uma indenização no valor de ${vMorte}. Se ocorrer <b>morte por acidente</b>, a Seguros Unimed pagará uma indenização no valor de ${vMorteAc}. Se ocorrer uma <b>invalidez por acidente ou doença</b> a Seguros Unimed pagará uma indenização no valor de ${vMorte}.<br><br><b>SERIT :</b> Se você ficar doente ou sofrer um acidente e precisar ficar afastado por mais de 7 dias a Seguros Unimed pagará uma renda no valor de ${vRenda} por mes. Cálculo: ${vRenda} ÷ 30 dias = R$ ${vDiaria} p/ dia. Recebimento líquido de 53 dias: <b>R$ ${vTotal60}</b>. Carências: Doenças comuns 30 dias / LER, DORT e Hérnias 180 dias. Acidente não tem carência.</div>`;
        } else {
            nome = document.getElementById('nomeEmp').value.trim();
            let vidas = parseInt(document.getElementById('vidasEmp').value);
            let combo = document.getElementById('planoEmp').value.split('|');
            capMorte = parseInt(combo[1]);
            precoFinal = `INVESTIMENTO TOTAL: R$ ${(parseFloat(combo[0]) * vidas).toFixed(2)}/mês`;
            tabelaHtml = `<tr><td>Morte Natural</td><td class="val-destaque">R$ ${capMorte.toLocaleString('pt-BR')}</td></tr>`;
            explicacaoHtml = `<div class="highlight-box">Seguro Profissional - Embrecat Catanduva.</div>`;
        }
        document.getElementById('resCabecalho').innerHTML = `<h3>ESTUDO TÉCNICO: ${nome}</h3>`;
        document.getElementById('listaCoberturas').innerHTML = tabelaHtml;
        document.getElementById('resTexto').innerHTML = explicacaoHtml;
        document.getElementById('resPreco').innerText = precoFinal;
        document.getElementById('areaSimulacao').style.display = 'block';
        document.getElementById('linkConsultor').href = `https://wa.me/5517997165139?text=${encodeURIComponent('Olá Emerson, vi meu estudo para ' + nome + ' e quero contratar.')}`;
    }

    function enviarSimulacaoWhatsApp() {
        const nome = modo === 'IND' ? document.getElementById('nomeInd').value : document.getElementById('nomeEmp').value;
        const whats = (modo === 'IND' ? document.getElementById('whatsInd').value : document.getElementById('whatsEmp').value).replace(/\D/g,'');
        const resumo = document.getElementById('resTexto').innerText;
        const preco = document.getElementById('resPreco').innerText;
        let msg = `*EAS CORRETORA - PROTEÇÃO UNIMED*\n\n${nome}, seu estudo ficou da seguinte forma:\n\n${resumo}\n\n💰 *${preco}*`;
        window.open(`https://wa.me/55${whats}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
