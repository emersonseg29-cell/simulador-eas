<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAS Corretora - Simulador Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1d2d44; --gold: #b89b3e; --unimed: #00995d; --text: #334155; }
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: var(--text); margin: 0; display: flex; justify-content: center; padding: 10px; }
        .container { width: 100%; max-width: 480px; padding: 20px; text-align: center; }
        
        /* Logo e Título */
        .logo { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--gold); margin-bottom: 15px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); margin: 0; font-size: 1.6rem; font-weight: 800; }
        .sub { color: var(--gold); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px; }
        
        /* Formulário */
        .input-group { margin-bottom: 18px; text-align: left; }
        label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
        input, select { width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; box-sizing: border-box; background: #f8fafc; outline: none; transition: 0.3s; color: var(--text); }
        input:focus, select:focus { border-color: var(--gold); background: #ffffff; }
        
        .btn-calc { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 10px; box-shadow: 0 10px 20px rgba(29, 45, 68, 0.2); }

        /* Resultado */
        #resultado { display: none; margin-top: 35px; border-top: 2px solid #f1f5f9; padding-top: 25px; text-align: left; }
        .price-card { background: #f0fdf4; padding: 25px; border-radius: 20px; text-align: center; border: 2px solid var(--unimed); margin-bottom: 20px; }
        .old-price { text-decoration: line-through; color: #94a3b8; font-size: 1.1rem; }
        .price-value { font-size: 3.2rem; font-weight: 800; color: var(--primary); margin: 5px 0; }
        .price-label { font-size: 0.85rem; color: var(--unimed); font-weight: 700; text-transform: uppercase; }

        .info-card { background: #f8fafc; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--gold); }
        .info-card h4 { margin: 0 0 10px; font-size: 1rem; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .info-card p { margin: 6px 0; font-size: 0.9rem; line-height: 1.5; color: #475569; }

        .badge-saude { background: #e0f2fe; color: #0369a1; padding: 12px; border-radius: 12px; font-size: 0.85rem; font-weight: 700; margin-bottom: 20px; text-align: center; border: 1px solid #bae6fd; }

        .btn-whats { display: flex; align-items: center; justify-content: center; gap: 10px; background: #25d366; color: white; text-decoration: none; padding: 20px; border-radius: 12px; font-weight: 700; font-size: 1.1rem; margin-top: 25px; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2); }
    </style>
</head>
<body>

<div class="container">
    <img src="logo oficial.jpg.png" class="logo" alt="EAS Corretora">
    <h2>EAS CORRETORA</h2>
    <div class="sub">Simulador Técnico Unimed</div>

    <div class="input-group">
        <label><i class="fa-solid fa-calendar"></i> Qual sua idade?</label>
        <input type="number" id="idade" placeholder="Ex: 35">
    </div>

    <div class="input-group">
        <label><i class="fa-solid fa-briefcase"></i> Qual sua Profissão?</label>
        <select id="profissao">
            <option value="empresario">Empresário / MEI</option>
            <option value="advogado">Advogados</option>
            <option value="saude">Médicos / Dentistas</option>
            <option value="outros">Outras Profissões</option>
        </select>
    </div>

    <div class="input-group">
        <label><i class="fa-solid fa-money-bill-trend-up"></i> Renda Mensal Desejada</label>
        <select id="beneficio">
            <option value="3000">R$ 3.000,00</option>
            <option value="6000">R$ 6.000,00</option>
            <option value="9000">R$ 9.000,00</option>
        </select>
    </div>

    <div class="input-group">
        <label><i class="fa-solid fa-ticket"></i> Cupom de Desconto</label>
        <input type="text" id="cupom" placeholder="Ex: EAS">
    </div>

    <button class="btn-calc" onclick="simular()">GERAR PROPOSTA CONSULTIVA</button>

    <div id="resultado">
        <div id="saudeAviso"></div>
        <div id="containerPreco"></div>
        
        <div class="info-card">
            <h4><i class="fa-solid fa-shield-halved" style="color:var(--gold)"></i> Estudo do SERIT</h4>
            <div id="resSerit"></div>
        </div>

        <div class="info-card">
            <h4><i class="fa-solid fa-clock" style="color:var(--gold)"></i> Carências Oficiais Unimed</h4>
            <p>• <b>30 dias:</b> Doenças</p>
            <p>• <b>180 dias:</b> LER, DORT e Hérnias</p>
            <p>• <b>Imediato:</b> Acidentes Pessoais</p>
        </div>

        <a href="" id="resWhats" class="btn-whats">
            <i class="fa-brands fa-whatsapp"></i> FALAR COM O CONSULTOR EAS
        </a>
    </div>
</div>

<script>
    function simular() {
        const idade = parseInt(document.getElementById('idade').value);
        const prof = document.getElementById('profissao').value;
        const benef = parseInt(document.getElementById('beneficio').value);
        const cupom = document.getElementById('cupom').value.trim().toUpperCase();

        if(!idade) return alert("Por favor, informe a idade para o cálculo.");
        if(idade > 65) return alert("Para idades acima de 65 anos, a contratação é sob consulta manual.");

        const resDiv = document.getElementById('resultado');
        
        // Lógica de Preços Ancorados (Conforme Tabelas Oficiais)
        const precosPadrao = { 3000: 120.79, 6000: 240.15, 9000: 340.00 };
        const precosPromo = { 3000: 74.05, 6000: 148.12, 9000: 211.30 };
        
        const precoNormal = precosPadrao[benef];
        const precoFinal = (cupom === "EAS") ? precosPromo[benef] : precoNormal;

        // Exibição do Preço
        document.getElementById('containerPreco').innerHTML = `
            <div class="price-card">
                <span class="price-label">${cupom === 'EAS' ? 'Condição Promocional Ativada' : 'Tabela de Investimento Padrão'}</span>
                ${cupom === 'EAS' ? `<div class="old-price">R$ ${precoNormal.toFixed(2)}</div>` : ''}
                <div class="price-value">R$ ${precoFinal.toFixed(2)}</div>
                <div style="color:#64748b; font-size:0.9rem;">investimento mensal</div>
            </div>`;

        // Regra de Saúde
        document.getElementById('saudeAviso').innerHTML = prof === 'saude' ? 
            `<div class="badge-saude"><i class="fa-solid fa-circle-check"></i> Vantagem: Dispensa de comprovação de renda para sua categoria!</div>` : '';

        // Estudo SERIT (Franquia 7 dias)
        const diaria = (benef / 30).toFixed(2);
        const totalIndenizado = ((30 - 7) * diaria).toFixed(2);

        document.getElementById('resSerit').innerHTML = `
            <p>• <b>Franquia:</b> 7 dias (Recebimento a partir do 8º dia)</p>
            <p>• <b>Sua Diária:</b> R$ ${diaria}</p>
            <p>• <b>Exemplo 30 dias:</b> Você recebe por 23 dias (Total: <b>R$ ${totalIndenizado}</b>).</p>
        `;
        
        // Link WhatsApp
        const msg = `Olá! Fiz a simulação EAS para ${prof} (${idade} anos). Valor R$ ${precoFinal.toFixed(2)}. Tenho interesse!`;
        document.getElementById('resWhats').href = `https://wa.me/5517997165139?text=${encodeURIComponent(msg)}`;
        
        resDiv.style.display = "block";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
