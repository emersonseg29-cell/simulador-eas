<!DOCTYPE html><html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal EAS Corretora - Consultoria Técnica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --eas-blue: #0f172a;
            --eas-gold: #b89b3e;
            --unimed: #00995d;
            --bg: #f1f5f9;
        }
        * { box-sizing: border-box; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: #334155;
        }
        header {
            background: white;
            padding: 45px 20px;
            text-align: center;
            border-bottom: 6px solid var(--eas-gold);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .main-logo {
            max-width: 550px;
            width: 100%;
            height: auto;
            margin-bottom: 15px;
        }
        .brand-subtitle {
            color: var(--eas-gold);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.1rem;
            margin-top: 10px;
        }
        .selector-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            max-width: 1000px;
            margin: -35px auto 50px;
            padding: 0 20px;
        }
        .card-select {
            background: white;
            padding: 45px 30px;
            border-radius: 25px;
            text-align: center;
            cursor: pointer;
            transition: 0.4s;
            border: 4px solid transparent;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        .card-select:hover {
            border-color: var(--unimed);
            transform: translateY(-10px);
        }
        .card-select i {
            font-size: 3.5rem;
            color: var(--eas-blue);
            margin-bottom: 20px;
        }
        .card-select h3 {
            margin: 15px 0;
            color: var(--eas-blue);
            font-size: 1.6rem;
            font-weight: 800;
        }
        .card-select.active {
            border-color: var(--eas-gold);
            background: #f8fafc;
        }
        .main-content {
            max-width: 750px;
            margin: 0 auto 100px;
            padding: 0 20px;
        }
        .simulador-box {
            background: white;
            padding: 45px;
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.15);
            display: none;
        }
        .section-title {
            text-align: center;
            color: var(--eas-blue);
            font-size: 1.8rem;
            margin-bottom: 35px;
            font-weight: 800;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--eas-blue);
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        input, select {
            width: 100%;
            padding: 16px;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1.05rem;
            box-sizing: border-box;
            outline: none;
            background: #fff;
        }
        input:focus, select:focus {
            border-color: var(--eas-gold);
        }
        .btn-calc {
            width: 100%;
            padding: 22px;
            background: var(--eas-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-calc:hover {
            opacity: 0.96;
        }
        #resultado {
            display: none;
            margin-top: 40px;
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            background: white;
        }
        .res-header {
            background: #f8fafc;
            padding: 35px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }
        .val-total {
            font-size: 3.2rem;
            color: var(--unimed);
            font-weight: 900;
            margin: 10px 0;
        }
        .res-body {
            padding: 30px;
        }
        .info-card {
            background: #f0fdf4;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 6px solid var(--unimed);
        }
        .info-card h4 {
            margin: 0 0 12px;
            color: var(--eas-blue);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            text-transform: uppercase;
        }
        .info-card p {
            margin: 8px 0;
            font-size: 1rem;
            line-height: 1.7;
            color: #1e293b;
            text-align: justify;
        }
        .calc-box {
            background: #fffbeb;
            border: 1px dashed #f59e0b;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 1rem;
            line-height: 1.7;
            color: #92400e;
        }
        .whatsapp-btn {
            background: #25d366;
            color: white;
            padding: 22px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            margin: 20px 30px 40px;
        }
        .mini-note {
            background: #eff6ff;
            border-left: 6px solid #2563eb;
        }
        .warning-note {
            background: #fff7ed;
            border-left: 6px solid #ea580c;
        }
        @media (max-width: 768px) {
            .selector-container { grid-template-columns: 1fr; }
            .simulador-box { padding: 25px; }
            .val-total { font-size: 2.4rem; }
        }
    </style>
</head>
<body><header>
    <img src="logo oficial.jpg.png" alt="EAS CORRETORA DE SEGUROS" class="main-logo">
    <div class="brand-subtitle">EAS CORRETORA DE SEGUROS • Proteção de Renda e Vida</div>
</header><section class="selector-container">
    <div class="card-select" id="cardInd" onclick="abrirSimulador('IND')">
        <i class="fas fa-user-shield"></i>
        <h3>Individual</h3>
        <p>Autônomos e Liberais</p>
    </div>
    <div class="card-select" id="cardEmp" onclick="abrirSimulador('EMP')">
        <i class="fas fa-building"></i>
        <h3>Empresarial</h3>
        <p>Seguro em Grupo para Empresas</p>
    </div>
</section><main class="main-content">
    <div id="simulador" class="simulador-box">
        <div class="section-title" id="sim-title">Estudo Personalizado</div><div class="input-group">
        <label id="labelNome">Nome / Razão Social</label>
        <input type="text" id="nome" placeholder="Digite aqui">
    </div>

    <div class="input-group" id="container-cnpj" style="display:none;">
        <label>CNPJ da Empresa</label>
        <input type="text" id="cnpj" placeholder="00.000.000/0000-00">
    </div>

    <div class="input-group">
        <label>WhatsApp do Cliente</label>
        <input type="tel" id="whatsapp" placeholder="(17) 99999-9999">
    </div>

    <div id="form-ind">
        <div class="input-group">
            <label>Idade (16 a 70 anos)</label>
            <input type="number" id="idade" placeholder="Ex: 35">
        </div>
        <div class="input-group">
            <label>Plano Escolhido</label>
            <select id="planoInd">
                <option value="bronze">Bronze: Renda 3 mil | Capital 50 mil</option>
                <option value="prata">Prata: Renda 5 mil | Capital 100 mil</option>
                <option value="ouro" selected>Ouro: Renda 10 mil | Capital 150 mil</option>
                <option value="top">Top: Renda 12 mil | Capital 200 mil</option>
            </select>
        </div>
        <div class="input-group">
            <label>Código Consultor</label>
            <input type="text" id="cupom" placeholder="Ex: EASVIP">
        </div>
    </div>

    <div id="form-emp" style="display:none;">
        <div class="input-group">
            <label>Nº de Colaboradores (Mínimo 3)</label>
            <input type="number" id="vidas" value="3">
        </div>
        <div class="input-group">
            <label>Plano Sugerido</label>
            <select id="planoEmp">
                <option value="49.90|50000|2000">Bronze: R$ 50k Vida | R$ 2k DIT</option>
                <option value="69.90|100000|2500">Prata: R$ 100k Vida | R$ 2,5k DIT</option>
                <option value="79.90|100000|3000">Ouro: R$ 100k Vida | R$ 3k DIT</option>
            </select>
        </div>
    </div>

    <button class="btn-calc" onclick="gerarEstudo()">Gerar Estudo Técnico</button>

    <div id="resultado">
        <div class="res-header">
            <span style="font-size: 0.85rem; font-weight: 800; color: var(--eas-blue);">INVESTIMENTO MENSAL CONSULTORIA</span>
            <div class="val-total" id="res-valor"></div>
        </div>
        <div class="res-body" id="res-explicacao"></div>
        <a href="#" id="wa-link" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> ENVIAR CONSULTORIA AO WHATSAPP</a>
    </div>
</div>

</main><script>
    let modo = 'IND';
    const CUPOM_OFICIAL = 'EASVIP';

    const PLANOS = {
        bronze: { nome: 'Bronze', capital: 50000, renda: 3000 },
        prata:  { nome: 'Prata',  capital: 100000, renda: 5000 },
        ouro:   { nome: 'Ouro',   capital: 150000, renda: 10000 },
        top:    { nome: 'Top',    capital: 200000, renda: 12000 }
    };

    // Base provisória. Depois, substitua pelos valores completos da tabela real por idade.
    const DATABASE = {
        bronze: {
            normal: { 16: 126.00, 35: 137.42, 43: 145.00, 53: 146.00 },
            call08: { 16: 75.00, 35: 81.33, 43: 88.14, 53: 92.43 }
        },
        prata: {
            normal: { 16: 211.13, 35: 231.04, 43: 268.34, 53: 359.12 },
            call08: { 16: 124.95, 35: 136.74, 43: 158.81, 53: 228.38 }
        },
        ouro: {
            normal: { 16: 365.30, 35: 400.87, 43: 449.48, 53: 521.69 },
            call08: { 16: 216.19, 35: 237.24, 43: 260.50, 53: 310.00 }
        },
        top: {
            normal: { 16: 430.00, 35: 472.00, 43: 525.00, 53: 610.00 },
            call08: { 16: 255.00, 35: 282.00, 43: 315.00, 53: 372.00 }
        }
    };

    function abrirSimulador(tipo) {
        modo = tipo;
        document.getElementById('simulador').style.display = 'block';
        document.getElementById('form-ind').style.display = tipo === 'IND' ? 'block' : 'none';
        document.getElementById('form-emp').style.display = tipo === 'EMP' ? 'block' : 'none';
        document.getElementById('container-cnpj').style.display = tipo === 'EMP' ? 'block' : 'none';
        document.getElementById('sim-title').innerText = tipo === 'IND' ? 'Proteção Individual' : 'Proteção Empresarial';
        document.getElementById('resultado').style.display = 'none';

        document.getElementById('cardInd').classList.toggle('active', tipo === 'IND');
        document.getElementById('cardEmp').classList.toggle('active', tipo === 'EMP');
    }

    function formatMoney(valor) {
        return valor.toLocaleString('pt-BR', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }

    function obterFaixaIdade(idade, tabela) {
        const idades = Object.keys(tabela).map(Number).sort((a, b) => a - b);
        let faixaEscolhida = idades[0];

        for (const faixa of idades) {
            if (idade >= faixa) {
                faixaEscolhida = faixa;
            }
        }
        return faixaEscolhida;
    }

    function gerarEstudo() {
        const nome = document.getElementById('nome').value.trim();
        const whats = document.getElementById('whatsapp').value.replace(/\D/g, '');

        if (!nome || whats.length < 11) {
            alert('Preencha nome e WhatsApp corretamente.');
            return;
        }

        let html = '';
        let msg = '';
        let preco = 0;

        if (modo === 'IND') {
            const idade = parseInt(document.getElementById('idade').value, 10);
            const planoKey = document.getElementById('planoInd').value;
            const cupom = document.getElementById('cupom').value.trim().toUpperCase();

            if (isNaN(idade) || idade < 16 || idade > 70) {
                alert('Idade permitida: 16 a 70 anos.');
                return;
            }

            const plano = PLANOS[planoKey];
            if (!plano) {
                alert('Plano inválido.');
                return;
            }

            const usarTabelaCall08 = cupom === CUPOM_OFICIAL;
            const tabelaSelecionada = usarTabelaCall08 ? DATABASE[planoKey].call08 : DATABASE[planoKey].normal;
            const faixaIdade = obterFaixaIdade(idade, tabelaSelecionada);
            preco = tabelaSelecionada[faixaIdade];

            const cap = plano.capital;
            const renda = plano.renda;
            const diaria = renda / 30;
            const exemplo60Dias = diaria * 53;
            const valorNormal = DATABASE[planoKey].normal[obterFaixaIdade(idade, DATABASE[planoKey].normal)];
            const economia = Math.max(valorNormal - preco, 0);

            const blocoBeneficio = usarTabelaCall08
                ? `<div class="info-card mini-note">
                        <h4><i class="fas fa-ticket-alt"></i> Benefício Comercial Aplicado</h4>
                        <p><b>Cupom aplicado:</b> ${CUPOM_OFICIAL}<br>
                        <b>Valor oficial:</b> R$ ${formatMoney(valorNormal)}<br>
                        <b>Valor com benefício EAS:</b> R$ ${formatMoney(preco)}<br>
                        <b>Economia estimada:</b> R$ ${formatMoney(economia)}</p>
                    </div>`
                : `<div class="info-card warning-note">
                        <h4><i class="fas fa-circle-info"></i> Valor Oficial</h4>
                        <p>Este estudo está exibindo o valor oficial da tabela individual. Caso tenha um código consultor válido, informe no campo acima para aplicar o benefício comercial.</p>
                   </div>`;

            html = `
                ${blocoBeneficio}

                <div class="info-card">
                    <h4><i class="fas fa-file-invoice-dollar"></i> Capitais Segurados Unimed</h4>
                    <p>
                        Seu estudo ficou da seguinte forma:<br>
                        Se ocorrer <b>morte natural</b>, a Seguros Unimed pagará uma indenização no valor de <b>R$ ${cap.toLocaleString('pt-BR')}</b>.<br>
                        Se ocorrer <b>morte por acidente</b>, a Seguros Unimed pagará uma indenização no valor de <b>R$ ${(cap * 2).toLocaleString('pt-BR')}</b>.<br>
                        Se ocorrer uma <b>invalidez por acidente ou doença</b>, a Seguros Unimed pagará uma indenização no valor de <b>R$ ${cap.toLocaleString('pt-BR')}</b>.
                    </p>
                </div>

                <div class="info-card">
                    <h4><i class="fas fa-hand-holding-medical"></i> SERIT (Renda Mensal)</h4>
                    <p>
                        Se você ficar doente ou sofrer um acidente e precisar ficar afastado por mais de 7 dias,
                        a Seguros Unimed pagará uma renda de <b>R$ ${renda.toLocaleString('pt-BR')}</b> por mês.
                        A indenização é paga por dia de afastamento.
                    </p>

                    <div class="calc-box">
                        Para saber o valor exato da indenização você fará o seguinte cálculo:<br><br>
                        Valor do benefício mensal <b>R$ ${renda.toLocaleString('pt-BR')}</b> dividido por 30 dias
                        = <b>R$ ${formatMoney(diaria)} por dia</b>.<br><br>
                        Exemplo de afastamento de 60 dias:<br>
                        descontando a franquia de 7 dias, a indenização estimada será de <b>R$ ${formatMoney(exemplo60Dias)}</b>.
                    </div>

                    <p style="font-size: 0.8rem; color: #64748b;">
                        <i>Carências para doenças comuns: 30 dias. LER, DORT, LTC, doenças progressivas, degenerativas e hérnias: 180 dias. Acidente isento.</i>
                    </p>
                </div>
            `;

            msg = `Olá ${nome.toUpperCase()}, seu estudo ficou pronto.\n\nPlano: ${plano.nome}\nCapital segurado: R$ ${cap.toLocaleString('pt-BR')}\nSERIT mensal: R$ ${renda.toLocaleString('pt-BR')}\nValor mensal: R$ ${formatMoney(preco)}\n\nPosso te explicar as coberturas e avançar com a proposta.`;

        } else {
            const vidas = parseInt(document.getElementById('vidas').value, 10);
            const p = document.getElementById('planoEmp').value.split('|');

            if (isNaN(vidas) || vidas < 3) {
                alert('Informe no mínimo 3 colaboradores.');
                return;
            }

            const valorPorVida = parseFloat(p[0]);
            const cap = parseInt(p[1], 10);
            const renda = parseInt(p[2], 10);
            preco = valorPorVida * vidas;

            const diariaEmp = renda / 30;
            const liqEmp = diariaEmp * 45;

            html = `
                <div class="info-card">
                    <h4><i class="fas fa-building"></i> Proposta Vida em Grupo</h4>
                    <p>
                        <b>Grupo segurado:</b> funcionários e prestadores com contrato.<br><br>
                        Se ocorrer <b>morte natural</b>, a Seguros Unimed pagará uma indenização no valor de <b>R$ ${cap.toLocaleString('pt-BR')}</b>.<br>
                        Se ocorrer <b>morte por acidente</b>, a Seguros Unimed pagará uma indenização no valor de <b>R$ ${(cap * 2).toLocaleString('pt-BR')}</b>.<br>
                        Se ocorrer uma <b>invalidez por acidente ou doença</b>, a Seguros Unimed pagará uma indenização no valor de <b>R$ ${cap.toLocaleString('pt-BR')}</b>.
                    </p>
                </div>

                <div class="info-card">
                    <h4><i class="fas fa-ambulance"></i> Cobertura DIT (Acidente)</h4>
                    <p>
                        Se ocorrer um acidente e o colaborador precisar ficar afastado por mais de 15 dias,
                        a Seguros Unimed pagará uma renda no valor de <b>R$ ${renda.toLocaleString('pt-BR')}</b> por mês.
                        A indenização é paga por dia de afastamento.
                    </p>

                    <div class="calc-box">
                        <strong>Cálculo do benefício equipe:</strong><br>
                        Valor mensal R$ ${renda.toLocaleString('pt-BR')} ÷ 30 dias = <b>R$ ${formatMoney(diariaEmp)} por dia</b>.<br>
                        Exemplo de afastamento de 60 dias: descontando a franquia de 15 dias, o total estimado é de <b>R$ ${formatMoney(liqEmp)}</b>.
                    </div>

                    <p style="font-size: 0.85rem;">
                        <i>O seguro DIT não cobre afastamento por doenças. Afastamento por acidente não tem carência.</i>
                    </p>
                </div>

                <div class="info-card" style="background: #f8fafc; border-left-color: #b89b3e;">
                    <h4><i class="fas fa-star"></i> Vantagens para a Empresa</h4>
                    <ul style="padding-left: 20px;">
                        <li><b>Legislação:</b> adequação contratual conforme a convenção e política da empresa.</li>
                        <li><b>Segurança jurídica:</b> proteção financeira em eventos cobertos.</li>
                        <li><b>Sem DPS:</b> não precisa preencher declaração de saúde.</li>
                        <li><b>Custo fixo:</b> não aumenta conforme a idade.</li>
                        <li><b>Correção monetária:</b> atualização conforme regras da apólice.</li>
                    </ul>
                </div>
            `;

            msg = `Olá ${nome.toUpperCase()}, sua proposta empresarial ficou pronta.\n\nQuantidade de vidas: ${vidas}\nCapital segurado: R$ ${cap.toLocaleString('pt-BR')}\nDIT mensal: R$ ${renda.toLocaleString('pt-BR')}\nValor mensal total: R$ ${formatMoney(preco)}\n\nPosso te explicar as coberturas e avançar com a proposta.`;
        }

        document.getElementById('res-valor').innerText = `R$ ${formatMoney(preco)}/mês`;
        document.getElementById('res-explicacao').innerHTML = html;
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('wa-link').href = `https://wa.me/55${whats}?text=${encodeURIComponent(msg)}`;
    }
</script></body>
</html>
