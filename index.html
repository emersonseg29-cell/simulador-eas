<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EAS Corretora - Simulador</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
margin:0;
padding:0;
}

.container{
max-width:600px;
margin:auto;
padding:30px;
background:white;
margin-top:40px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#0f172a;
color:white;
font-weight:bold;
cursor:pointer;
}

.resultado{
margin-top:30px;
padding:20px;
background:#ecfdf5;
border-radius:8px;
display:none;
}

.valor{
font-size:32px;
color:#00995d;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>EAS Corretora</h1>

<label>Nome</label>
<input type="text" id="nome">

<label>Idade</label>
<input type="number" id="idade">

<label>Plano</label>

<select id="plano">
<option value="bronze">Bronze</option>
<option value="prata">Prata</option>
<option value="ouro">Ouro</option>
</select>

<button onclick="simular()">Gerar Estudo</button>

<div class="resultado" id="resultado">

<p>Investimento Mensal</p>

<div class="valor" id="valor"></div>

</div>

</div>

<script>

const tabela = {

bronze: 120,
prata: 230,
ouro: 400

}

function simular(){

const plano=document.getElementById("plano").value

const preco=tabela[plano]

document.getElementById("valor").innerText="R$ "+preco

document.getElementById("resultado").style.display="block"

}

</script>

</body>
</html>
