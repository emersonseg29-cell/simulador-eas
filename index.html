<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Consultoria Técnica - EAS Corretora</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --eas-blue: #0f172a; 
            --eas-gold: #b89b3e; 
            --unimed: #00995d; 
            --bg: #f1f5f9; 
        }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #334155; }

        header { 
            background: white; 
            padding: 50px 20px; 
            text-align: center; 
            border-bottom: 6px solid var(--eas-gold);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .main-logo { max-width: 550px; width: 100%; height: auto; margin-bottom: 15px; }
        .brand-subtitle { 
            color: var(--eas-gold); 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-size: 1.1rem;
        }

        .main-content { max-width: 850px; margin: -40px auto 100px; padding: 0 20px; }
        .card { 
            background: white; 
            padding: 45px; 
            border-radius: 30px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.15); 
        }

        .section-title { 
            text-align: center; 
            color: var(--eas-blue); 
            font-size: 1.8rem; 
            margin-bottom: 35px; 
            font-weight: 900;
            text-transform: uppercase;
        }

        .input-group { margin-bottom: 25px; }
        label { 
            display: block; 
            font-size: 0.85rem; 
            font-weight: 800; 
            color: var(--eas-blue); 
            margin-bottom: 10px; 
            text-transform: uppercase; 
        }
        input, select { 
            width: 100%; 
            padding: 18px; 
            border: 2px solid #cbd5e1; 
            border-radius: 15px; 
            font-size: 1.1rem; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s; 
        }
        input:focus { border-color: var(--unimed); box-shadow: 0 0 0 4px rgba(0, 153, 93, 0.1); }

        .btn-calc { 
            width: 100%; 
            padding: 25px; 
            background: var(--eas-blue); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-size: 1.3rem; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-calc:hover { background: #1e293b; transform: translateY(-2px); }

        #resultado { display: none; margin-top: 40px; border-radius: 25px; overflow: hidden; border: 1px solid #e2e8f0; background: white; }
        .res-header { background: #f8fafc; padding: 40px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .val-total { font-size: 3.5rem; color: var(--unimed); font-weight: 900; margin: 15px 0; }
        
        .res-body { padding: 35px; }
        .info-card { 
            background: #f0fdf4; 
            border-radius: 15px; 
            padding: 25px; 
            margin-bottom: 20px; 
            border-left: 6px solid var(--unimed); 
        }
        .info-card h4 { margin: 0 0 12px; color: var(--eas-blue); display: flex; align-items: center; gap: 12px; font-size: 1.1rem; text-transform: uppercase; font-weight: 900; }
        .info-card p { margin: 8px 0; font-size: 1.05rem; line-height: 1.7; color: #1e293b; text-align: justify; }
        
        .calc-box { 
            background: #fffbeb; 
            border: 1px dashed #f59e0b; 
            padding: 20px; 
            border-radius: 12px; 
            margin: 20px 0; 
            font-size: 1.05rem; 
            line-height: 1.7; 
            color: #92400e; 
        }

        .whatsapp-btn { 
            background: #25d366; 
            color:white; 
            padding: 25px; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            text-decoration: none; 
            font-weight: 900; 
            font-size: 1.2rem;
            margin: 10px 0;
        }

        @media (max-width: 768px) { .main-logo { max-width: 100%; } .val-total { font-size: 2.5rem; } }
    </style>
</head>
<body>

<header>
    <img src="logo oficial.jpg.png" alt="EAS CORRETORA DE SEGUROS" class="main-logo">
    <div class="brand-subtitle">EAS CORRETORA DE SEGUROS • PROTEÇÃO DE RENDA E VIDA</div>
</header>

<main class="main-content">
    <div class="card">
        <h2 class="section-title">Estudo de Viabilidade</h2>
        
        <div class="input-group">
            <label>Nome do Cliente</label>
            <input type="text" id="nome" placeholder="Digite o nome completo">
        </div>

        <div class="input-group">
            <label>Idade Atual</label>
            <input type="number" id="idade" placeholder="Ex: 35">
        </div>

        <div class="input-group">
            <label>Plano de Cobertura</label>
            <select id="plano">
                <option value="bronze">BRONZE (3k Renda / 50k Vida)</option>
                <option value="prata">PRATA (5k Renda / 100k Vida)</option>
                <option value="ouro" selected>OURO (10k Renda / 120k Vida)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Código Promocional</label>
            <input type="text" id="cupom" placeholder="Insira UNIMED08 para desconto">
        </div>

        <div class="input-group">
            <label>WhatsApp</label>
            <input type="tel" id="whatsapp" placeholder="(17) 99999-9999">
        </div>

        <button class="btn-calc" onclick="gerarEstudo()">GERAR CONSULTORIA TÉCNICA</button>

        <div id="resultado">
            <div class="res-header">
                <span style="font-weight: 800; color: var(--eas-blue); text-transform: uppercase;">Investimento Mensal Final</span>
                <div class="val-total" id="res-valor"></div>
            </div>
            <div class="res-body" id="res-conteudo"></div>
            <div style="padding: 0 35px 35px;">
                <a href="#" id="wa-link" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> ENVIAR PELO WHATSAPP</a>
            </div>
        </div>
    </div>
</main>

<script>
    /**
     * DATABASE DE PREÇOS REAIS (MAPEAMENTO IDADE A IDADE)
     * Valores confirmados conforme PDFs e CSVs da Seguros Unimed
     */
    const DATABASE = {
        ouro: {
            cap: 120000, renda: 10000,
            a37: { 18: 365.30, 35: 400.87, 37: 427.39, 43: 389.48, 44: 583.80, 65: 1250.00, 70: 1516.42 },
            call08: { 18: 216.19, 35: 237.24, 37: 252.93, 43: 230.50, 44: 344.92, 65: 750.00, 70: 895.45 }
        },
        prata: {
            cap: 100000, renda: 5000,
            a37: { 18: 211.13, 35: 231.04, 37: 247.54, 43: 268.34, 44: 355.60, 65: 800.00, 70: 924.56 },
            call08: { 18: 124.95, 35: 124.95, 37: 146.51, 43: 158.81, 44: 211.31, 65: 480.00, 70: 547.12 }
        },
        bronze: {
            cap: 50000, renda: 3000,
            a37: { 18: 126.00, 35: 137.42, 37: 146.87, 43: 105.00, 44: 204.86, 65: 361.40, 70: 532.64 },
            call08: { 18: 75.00, 35: 81.33, 37: 86.92, 43: 62.14, 44: 120.67, 65: 213.85, 70: 315.20 }
        }
    };

    function buscarPrecoReal(idade, plano, cupom) {
        const isDesconto = (cupom.toUpperCase() === "UNIMED08");
        const tabela = isDesconto ? DATABASE[plano].call08 : DATABASE[plano].a37;
        
        // Busca a idade exata ou o ponto de reenquadramento anterior
        const chaves = Object.keys(tabela).map(Number).sort((a,b) => b - a);
        const idadeChave = chaves.find(i => idade >= i) || chaves[chaves.length - 1];
        
        return tabela[idadeChave];
    }

    function gerarEstudo() {
        const nome = document.getElementById('nome').value.trim();
        const idade = parseInt(document.getElementById('idade').value);
        const planoKey = document.getElementById('plano').value;
        const cupom = document.getElementById('cupom').value;
        const whats = document.getElementById('whatsapp').value.replace(/\D/g, '');

        if (!nome || !idade || isNaN(idade)) { alert("Preencha Nome e Idade corretamente."); return; }
        if (idade < 16 || idade > 70) { alert("Idade permitida entre 16 e 70 anos."); return; }

        const precoFinal = buscarPrecoReal(idade, planoKey, cupom);
        const plano = DATABASE[planoKey];
        
        // Cálculos do Cerne Explicativo
        const diaria = (plano.renda / 30).toLocaleString('pt-BR', {minimumFractionDigits:2});
        const liq = ((plano.renda / 30) * 53).toLocaleString('pt-BR', {minimumFractionDigits:2});

        document.getElementById('res-valor').innerText = `R$ ${precoFinal.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
        
        // O CERNE: Manutenção integral das explicações de benefícios
        document.getElementById('res-conteudo').innerHTML = `
            <div class="info-card">
                <h4><i class="fas fa-file-invoice-dollar"></i> Capitais Seguros Unimed</h4>
                <p>Seu estudo personalizado para <b>${nome.toUpperCase()}</b> ficou da seguinte forma:<br>
                Se ocorrer <b>morte natural</b> a Seguros Unimed pagará uma indenização no valor de R$ ${plano.cap.toLocaleString('pt-BR')}.<br>
                Se ocorrer <b>morte por acidente</b>, o valor dobra para <b>R$ ${(plano.cap*2).toLocaleString('pt-BR')}</b>.<br>
                Se ocorrer uma <b>invalidez por acidente ou doença</b> a Seguros Unimed pagará uma indenização no valor de R$ ${plano.cap.toLocaleString('pt-BR')}.</p>
            </div>
            <div class="info-card">
                <h4><i class="fas fa-hand-holding-medical"></i> SERIT (Renda Mensal)</h4>
                <p>Se você ficar doente ou sofrer um acidente e precisar ficar afastado por mais de 7 dias a Seguros Unimed pagará uma renda de R$ ${plano.renda.toLocaleString('pt-BR')} por mes. A indenização é paga por dia de afastamento.</p>
                <div class="calc-box">
                    <strong>Cálculo do Benefício:</strong><br>
                    Valor mensal R$ ${plano.renda.toLocaleString('pt-BR')} dividido por 30 dias <i>"por que a seguradora paga por dia de afastamento"</i> = <b>R$ ${diaria} por dia</b>. Em seguida voce multiplica a diaria pelos dias de afastamento descontando a franquia de 7 dias (exemplo 60 dias total 53 dias pagos) total <b>R$ ${liq} líquido direto em conta</b>.
                </div>
                <p style="font-size: 0.85rem; color: #64748b;"><i>*Carencias: Doenças comuns 30 dias. Doenças degenerativas, Hernias, LER/DORT 180 dias. Acidente é isento de carência.</i></p>
            </div>
        `;

        const msgWhats = `Olá ${nome.toUpperCase()}, seu estudo EAS Corretora está pronto!\n💰 Investimento: R$ ${precoFinal.toLocaleString('pt-BR', {minimumFractionDigits:2})}/mês`;
        document.getElementById('wa-link').href = `https://wa.me/55${whats}?text=${encodeURIComponent(msgWhats)}`;
        document.getElementById('resultado').style.display = 'block';
    }
</script>
</body>
</html>
