<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAS Corretora - Simulador Oficial Unimed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --primary: #1d2d44; --gold: #b89b3e; --unimed: #00995d; --text: #334155; }
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: #ffffff; padding: 20px; }
        .logo-img { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--gold); margin: 0 auto 15px; display: block; object-fit: cover; }
        h2 { color: var(--primary); text-align: center; margin: 0; font-size: 1.5rem; font-weight: 800; }
        .sub { color: var(--gold); text-align: center; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px; }
        .section-title { font-size: 0.85rem; font-weight: 800; color: var(--primary); margin: 25px 0 10px; border-bottom: 2px solid var(--gold); display: inline-block; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.8rem; font-weight: 700; color: #64748b; margin-bottom: 5px; }
        input, select { width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; box-sizing: border-box; background: #f8fafc; outline: none; }
        .btn-calc { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 15px; }
        #areaSimulacao { display: none; margin-top: 40px; text-align: left; }
        
        /* Ajuste específico para o PDF não sair em branco */
        .pdf-content { 
            padding: 30px; 
            border: 1px solid #eee; 
            border-radius: 20px; 
            background: #ffffff !important; 
            color: #1e293b !important;
            line-height: 1.6;
        }
        
        .highlight-box { background: #f0fdf4; padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid var(--unimed); }
        .action-buttons { display: flex; gap: 12px; margin-top: 25px; }
        .btn-action { flex: 1; padding: 18px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; font-size: 1rem; }
        .btn-consultor { background: #e2e8f0; color: var(--primary); }
        .btn-contratar { background: #25d366; color: white; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo oficial.jpg.png" class="logo-img" alt="EAS Corretora">
    <h2>EAS CORRETORA</h2>
    <div class="sub">Simulador Técnico Unimed</div>

    <div class="form-box">
        <div class="section-title">Dados do Cliente</div>
        <div class="input-group">
            <label>Nome do Cliente</label>
            <input type="text" id="leadNome" placeholder="Nome Completo">
        </div>
        <div class="input-group">
            <label>WhatsApp do Cliente</label>
            <input type="tel" id="leadWhats" placeholder="(00) 00000-0000" maxlength="15">
        </div>

        <div class="section-title">Configuração do Estudo</div>
        <div class="input-group">
            <label>Idade do Segurado (Mínimo 16 anos)</label>
            <input type="number" id="idade" placeholder="Ex: 35">
        </div>
        <div class="input-group">
            <label>Plano de Proteção de Renda</label>
            <select id="planoSerit">
                <option value="3000|50000">R$ 3.000,00 (Plano Bronze)</option>
                <option value="6000|100000">R$ 6.000,00 (Plano Prata)</option>
                <option value="9000|100000" selected>R$ 9.000,00 (Plano Ouro)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Cupom Promocional (EAS)</label>
            <input type="text" id="cupom" placeholder="Ex: EAS">
        </div>

        <button class="btn-calc" onclick="gerarEstudo()">VER ESTUDO COMPLETO</button>
    </div>

    <div id="areaSimulacao">
        <div id="pdfArea" class="pdf-content">
            <div style="text-align:center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px;">
                <h3 style="color:#1d2d44; margin:0; text-transform:uppercase;">Estudo Técnico de Proteção</h3>
                <p>Preparado exclusivamente para: <b id="outNome"></b></p>
            </div>
            
            <div id="corpoTexto"></div>

            <div style="text-align:right; font-weight:800; color:#1d2d44; font-size:1.4rem; border-top: 2px solid #eee; padding-top:15px; margin-top:20px;">
                PRÊMIO MENSAL: <span id="outPremio" style="color:#00995d"></span>
            </div>
            <div style="text-align:center; margin-top: 30px; font-size: 0.8rem; color: #94a3b8; border-top: 1px dashed #eee; padding-top: 10px;">
                <b>EAS Corretora de Seguros</b> | Emerson: (17) 99716-5139<br>
                Parceiro Oficial Seguros Unimed
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-action btn-consultor" onclick="baixarPDF()">
                <i class="fa-solid fa-file-pdf"></i> FALAR COM CONSULTOR
            </button>
            <a href="#" id="linkWhats" class="btn-action btn-contratar" target="_blank">
                <i class="fa-solid fa-cart-shopping"></i> CONTRATAR AGORA
            </a>
        </div>
    </div>
</div>

<script>
    // Máscara de Telefone
    const telInput = document.getElementById('leadWhats');
    telInput.addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 11) v = v.slice(0, 11);
        let x = v.match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    const rates = {
        "30": {"morte": 0.2192, "iea": 0.1854, "ipa": 0.1206, "ifpd": 0.0328, "serit": 26.855},
        "35": {"morte": 0.2654, "iea": 0.1854, "ipa": 0.1206, "ifpd": 0.0398, "serit": 29.595},
        "40": {"morte": 0.3866, "iea": 0.1854, "ipa": 0.1206, "ifpd": 0.0580, "serit": 33.645},
        "45": {"morte": 0.6922, "iea": 0.1854, "ipa": 0.1206, "ifpd": 0.1038, "serit": 38.695},
        "50": {"morte": 1.1712, "iea": 0.1854, "ipa": 0.1206, "ifpd": 0.1756, "serit": 46.030},
        "55": {"morte": 1.7278, "iea": 0.1854, "ipa": 0.1206, "ifpd": 0.2592, "serit": 58.020},
        "60": {"morte": 2.4058, "iea": 0.1854, "ipa": 0.1206, "ifpd": 0.3608, "serit": 77.585},
        "65": {"morte": 3.7066, "iea": 0.1854, "ipa": 0.1206, "ifpd": 0.5560, "serit": 109.835}
    };

    function gerarEstudo() {
        const nome = document.getElementById('leadNome').value;
        const whatsRaw = telInput.value.replace(/\D/g, '');
        const idade = parseInt(document.getElementById('idade').value);
        const combo = document.getElementById('planoSerit').value.split('|');
        const capSerit = parseInt(combo[0]);
        const capMorte = parseInt(combo[1]);
        const cupom = document.getElementById('cupom').value.trim().toUpperCase();

        if(!nome || whatsRaw.length !== 11 || !idade) return alert("Preencha todos os dados.");
        if(idade < 16) return alert("Mínimo 16 anos.");

        let faixa = "30";
        if(idade > 60) faixa = "65"; else if(idade > 55) faixa = "60"; else if(idade > 50) faixa = "55"; 
        else if(idade > 45) faixa = "50"; else if(idade > 40) faixa = "45"; else if(idade > 35) faixa = "40"; 
        else if(idade > 30) faixa = "35";

        const r = rates[faixa];
        let pMorte = (capMorte / 1000) * (r.morte + r.iea + r.ipa + r.ifpd);
        let pSerit = (capSerit / 1000) * r.serit;
        let total = pMorte + pSerit + 1.44;

        if (cupom === "EAS" && new Date().getDate() >= 25) total *= 0.65;

        document.getElementById('outNome').innerText = nome;
        document.getElementById('outPremio').innerText = `R$ ${total.toFixed(2)}`;

        const diaria = (capSerit / 30);
        const total53 = diaria * 53;

        document.getElementById('corpoTexto').innerHTML = `
            <p>Se ocorrer <b>morte natural</b> a indenização é de <b>R$ ${capMorte.toLocaleString('pt-BR')},00</b>.</p>
            <p>Se ocorrer <b>morte por acidente</b>, a indenização é de <b>R$ ${(capMorte*2).toLocaleString('pt-BR')},00</b>.</p>
            <p>Se ocorrer <b>invalidez</b> a indenização é de <b>R$ ${capMorte.toLocaleString('pt-BR')},00</b>.</p>
            <p><b>SERIT:</b> Renda mensal de <b>R$ ${capSerit.toLocaleString('pt-BR')},00</b>. A indenização é paga da seguinte forma:</p>
            <div class="highlight-box">
                <b>EXEMPLO PRÁTICO (60 DIAS):</b><br>
                Suponhamos que receba um atestado de 60 dias. A seguradora paga por dia de afastamento.<br><br>
                Cálculo da diária (R$ ${capSerit.toLocaleString('pt-BR')},00 ÷ 30 dias) = <b>R$ ${diaria.toFixed(2).replace('.',',')} por dia</b>.<br><br>
                Em seguida multiplique a diária pelos dias de afastamento descontando a franquia de 7 dias (53 dias totais).<br>
                <b>Total da Indenização: R$ ${total53.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</b>.
            </div>
            <p><b>CARÊNCIAS:</b> 30 dias para doenças comuns. 180 dias para LER, DORT e Hérnias. Acidente Isento.</p>
        `;

        const msg = `*EAS CORRETORA*\nOlá ${nome}, tenho interesse no Plano de R$ ${capSerit} de renda mensal.`;
        document.getElementById('linkWhats').href = `https://wa.me/55${whatsRaw}?text=${encodeURIComponent(msg)}`;
        document.getElementById('areaSimulacao').style.display = "block";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function baixarPDF() {
        const element = document.getElementById('pdfArea');
        const nome = document.getElementById('leadNome').value.replace(/\s+/g, '_');
        
        const opt = {
            margin: 15,
            filename: `Estudo_EAS_${nome}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { 
                scale: 2, 
                logging: false, 
                useCORS: true,
                backgroundColor: "#ffffff" 
            },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // Adiciona um pequeno delay para garantir a renderização antes de capturar
        setTimeout(() => {
            html2pdf().set(opt).from(element).save();
        }, 500);
    }
</script>
</body>
</html>
