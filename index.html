<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAS Corretora - Simulador SERIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1d2d44; 
            --gold: #b89b3e; 
            --unimed: #00995d; 
            --bg: #f0f4f8;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background-color: var(--bg); overflow-x: hidden; }

        /* TELA DE CAPA */
        #capa {
            height: 100vh;
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--unimed) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            color: white;
            position: fixed;
            z-index: 100;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .capa-content img { width: 220px; height: auto; margin-bottom: 30px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2)); }
        .capa-content h1 { font-size: 2rem; margin-bottom: 15px; font-weight: 700; }
        .capa-content p { font-size: 1.1rem; margin-bottom: 40px; opacity: 0.9; font-weight: 300; max-width: 400px; }
        
        .btn-start {
            background: var(--white);
            color: var(--primary);
            padding: 18px 40px;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .btn-start:hover { transform: scale(1.05); background: var(--gold); color: white; }

        /* TELA DO SIMULADOR */
        .app-container { opacity: 0; padding: 20px; max-width: 500px; margin: 0 auto; transition: 1s; }
        
        .header-app { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-top: 10px; }
        .logo-header { height: 60px; width: auto; }
        .logo-unimed-header { height: 30px; opacity: 0.8; }

        .card {
            background: var(--white);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .card h3 { color: var(--primary); margin-bottom: 20px; font-size: 1.1rem; border-left: 4px solid var(--gold); padding-left: 10px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #7f8c8d; margin-bottom: 8px; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 15px;
            border: 2px solid #edf2f7;
            border-radius: 14px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            background: #f8fafc;
        }
        .input-group input:focus { border-color: var(--unimed); background: white; }

        .btn-calc {
            width: 100%;
            padding: 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(29, 45, 68, 0.2);
            transition: 0.3s;
        }
        .btn-calc:hover { background: var(--unimed); }

        /* RESULTADO */
        #resultado { display: none; margin-top: 30px; animation: fadeIn 0.5s ease; }
        .price-card {
            background: linear-gradient(135deg, var(--primary) 0%, #2c3e50 100%);
            color: white;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .price-card::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%); }
        .price-card span { font-size: 0.9rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .price-card h2 { font-size: 2.5rem; margin: 10px 0; color: var(--gold); }

        .info-box { background: #f0fdf4; border-left: 4px solid var(--unimed); padding: 20px; border-radius: 12px; font-size: 0.9rem; color: #1e293b; line-height: 1.6; text-align: justify; }

        .btn-whatsapp {
            width: 100%;
            padding: 18px;
            background: #25d366;
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* UTILITÁRIOS */
        .hidden { display: none; }
        .show { opacity: 1 !important; }
        .move-up { transform: translateY(-100%); }
    </style>
</head>
<body>

    <div id="capa">
        <div class="capa-content">
            <img src="logo oficial.jpg.png" alt="EAS Corretora">
            <h1>Proteção SERIT</h1>
            <p>Sua renda protegida com a solidez da Seguros Unimed e a consultoria da EAS.</p>
            <button class="btn-start" onclick="iniciarSimulador()">Simular Agora</button>
        </div>
    </div>

    <div class="app-container" id="app">
        <header class="header-app">
            <img src="logo oficial.jpg.png" class="logo-header">
            <img src="logo-unimed.png" class="logo-unimed-header">
        </header>

        <div class="card">
            <h3>Dados da Simulação</h3>
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" id="nome" placeholder="Como podemos te chamar?">
            </div>
            <div class="input-group">
                <label>WhatsApp</label>
                <input type="tel" id="whats" placeholder="(17) 99999-9999">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label>Idade</label>
                    <input type="number" id="idade" value="43">
                </div>
                <div class="input-group">
                    <label>Plano</label>
                    <select id="plano">
                        <option value="bronze">Bronze (3k)</option>
                        <option value="prata">Prata (5k)</option>
                        <option value="ouro" selected>Ouro (10k)</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label>Cupom de Desconto</label>
                <input type="text" id="cupom" placeholder="Digite aqui se tiver um">
            </div>
            <button class="btn-calc" onclick="gerarEstudo()">Gerar Estudo Técnico</button>
        </div>

        <div id="resultado">
            <div class="price-card">
                <span>Investimento Mensal</span>
                <h2 id="resPreco">R$ 0,00</h2>
                <p id="labelTabela" style="font-size: 0.7rem; opacity: 0.7;"></p>
            </div>

            <div class="card">
                <h3>Resumo das Coberturas</h3>
                <div id="resTexto"></div>
                <a href="#" id="btnWhats" class="btn-whatsapp" target="_blank">
                    <i class="fab fa-whatsapp"></i> Receber no WhatsApp
                </a>
            </div>
        </div>

        <p style="text-align: center; font-size: 0.7rem; color: #94a3b8; margin-top: 20px; padding-bottom: 40px;">
            EAS Corretora &copy; 2024 - Todos os direitos reservados.
        </p>
    </div>

<script>
    function iniciarSimulador() {
        document.getElementById('capa').classList.add('move-up');
        document.getElementById('app').classList.add('show');
    }

    function calcularPreco(idade, plano, temCupom) {
        // Base PDF 43 anos
        const baseA37 = { ouro: 521.71, prata: 286.94, bronze: 162.83 }; // Tabela Normal
        const baseCall08 = { ouro: 308.75, prata: 170.31, bronze: 96.66 }; // Tabela Desconto

        let valorBase = temCupom ? baseCall08[plano] : baseA37[plano];
        
        // Fator de reenquadramento etário (média 5.5% ano)
        let diff = idade - 43;
        let fator = Math.pow(1.055, diff);
        
        // Ajustes faixas etárias avançadas
        if(idade >= 60) fator *= 1.12;
        if(idade >= 66) fator *= 1.10;

        return valorBase * fator;
    }

    function gerarEstudo() {
        const nome = document.getElementById('nome').value;
        const whats = document.getElementById('whats').value.replace(/\D/g,'');
        const idade = parseInt(document.getElementById('idade').value);
        const plano = document.getElementById('plano').value;
        const cupom = document.getElementById('cupom').value.toUpperCase();
        
        if(!nome || isNaN(idade)) { alert("Por favor, preencha nome e idade."); return; }

        const temCupom = (cupom === "UNIMED08");
        const preco = calcularPreco(idade, plano, temCupom);

        // Coberturas baseadas no plano
        let capRenda = (plano === 'bronze' ? 3000 : plano === 'prata' ? 5000 : 10000);
        let capMorte = (plano === 'bronze' ? 50000 : plano === 'prata' ? 100000 : 120000);
        let vDiaria = (capRenda / 30).toLocaleString('pt-BR', {minimumFractionDigits: 2});

        document.getElementById('resPreco').innerText = `R$ ${preco.toFixed(2)}`;
        document.getElementById('labelTabela').innerText = temCupom ? "Tabela CALL 08 Ativada" : "Tabela Standard A-37";
        
        const textoEstudo = `Olá ${nome}, seu estudo SERIT foi gerado:\n\n` +
            `• Morte Natural: R$ ${capMorte.toLocaleString('pt-BR')}\n` +
            `• Morte Acidental: R$ ${(capMorte*2).toLocaleString('pt-BR')}\n` +
            `• SERIT (Renda Mensal): R$ ${capRenda.toLocaleString('pt-BR')}\n` +
            `• Valor Diário: R$ ${vDiaria}\n\n` +
            `Carências: 30 dias para doenças comuns. 180 dias para LER/DORT. Acidentes isento de carência.\n\n` +
            `Investimento: R$ ${preco.toFixed(2)}/mês`;

        document.getElementById('resTexto').innerHTML = `<div class="info-box">${textoEstudo.replace(/\n/g, '<br>')}</div>`;
        document.getElementById('resultado').style.display = 'block';
        
        // Link WhatsApp
        const msgWhats = `*EAS CORRETORA - SIMULADOR SERIT*\n\n${textoEstudo}`;
        document.getElementById('btnWhats').href = `https://wa.me/55${whats}?text=${encodeURIComponent(msgWhats)}`;

        // Scroll suave para o resultado
        setTimeout(() => {
            window.scrollTo({ top: document.getElementById('resultado').offsetTop, behavior: 'smooth' });
        }, 100);
    }
</script>
</body>
</html>
