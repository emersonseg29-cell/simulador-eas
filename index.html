<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAS Corretora - Simulador Oficial Unimed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1d2d44; --gold: #b89b3e; --unimed: #00995d; --text: #334155; --error: #e11d48; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: #ffffff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .logo-img { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--gold); margin: 0 auto 15px; display: block; object-fit: cover; }
        h2 { color: var(--primary); text-align: center; margin: 0; font-size: 1.5rem; }
        .sub { color: var(--gold); text-align: center; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 25px; }
        .type-selector { display: flex; background: #e2e8f0; border-radius: 12px; padding: 5px; margin-bottom: 25px; }
        .type-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; color: #64748b; background: transparent; transition: 0.3s; }
        .type-btn.active { background: var(--primary); color: white; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 5px; }
        input, select { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; box-sizing: border-box; outline: none; }
        input.invalid { border-color: var(--error); background-color: #fff1f2; }
        .btn-calc { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(29, 45, 68, 0.3); }
        #areaSimulacao { display: none; margin-top: 30px; border-top: 2px dashed #eee; padding-top: 20px; }
        .pdf-content { padding: 25px; border-radius: 15px; background: #fff; line-height: 1.6; font-size: 0.95rem; border: 1px solid #eee; }
        .resumo-table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 0.85rem; }
        .resumo-table th { background: #f1f5f9; color: var(--primary); text-align: left; padding: 12px; border-bottom: 2px solid var(--gold); }
        .resumo-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; color: #475569; }
        .val-destaque { font-weight: 800; color: var(--unimed); }
        .highlight-box { background: #f0fdf4; padding: 20px; border-radius: 12px; margin: 15px 0; border-left: 5px solid var(--unimed); font-size: 0.9rem; text-align: justify; white-space: pre-wrap;}
        .action-buttons { display: grid; gap: 10px; margin-top: 20px; }
        .btn-action { padding: 18px; border-radius: 12px; text-decoration: none; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.95rem; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div id="tagEquipe" style="background: var(--gold); color: white; padding: 5px; border-radius: 5px; text-align: center; display: none; margin-bottom: 10px; font-size: 0.7rem;">MODO EQUIPE ATIVADO</div>
    <img src="logo oficial.jpg.png" class="logo-img">
    <h2>EAS CORRETORA</h2>
    <div class="sub">Simulador de Proteção Unimed</div>

    <div class="type-selector">
        <button class="type-btn active" id="btnInd" onclick="switchType('IND')">INDIVIDUAL (CPF)</button>
        <button class="type-btn" id="btnEmp" onclick="switchType('EMP')">EMPRESARIAL (PJ)</button>
    </div>

    <div id="formInd">
        <div class="input-group"><label>Nome do Cliente</label><input type="text" id="nomeInd" placeholder="Nome Completo"></div>
        <div class="input-group"><label>WhatsApp do Cliente</label><input type="tel" id="whatsInd" placeholder="(00) 00000-0000" maxlength="15"></div>
        <div class="input-group"><label>Idade (14 a 70 anos)</label><input type="number" id="idadeInd" placeholder="Ex: 35"></div>
        <div class="input-group">
            <label>Plano de Renda Protegida</label>
            <select id="planoInd">
                <option value="bronze">Plano Bronze 3 mil</option>
                <option value="prata">Plano Prata 5 mil</option>
                <option value="ouro" selected>Plano Ouro 10 mil</option>
            </select>
        </div>
        <div class="input-group"><label>Cupom de Desconto</label><input type="text" id="cupomInd" placeholder="Opcional"></div>
    </div>

    <div id="formEmp" style="display:none;">
        <div class="input-group"><label>Nome da Empresa / Colaborador</label><input type="text" id="nomeEmp" placeholder="Razão Social"></div>
        <div class="input-group"><label>WhatsApp de Contato</label><input type="tel" id="whatsEmp" placeholder="(00) 00000-0000" maxlength="15"></div>
        <div class="input-group"><label>Nº de Vidas (Mín 3)</label><input type="number" id="vidasEmp" value="3"></div>
        <div class="input-group">
            <label>Plano Empresarial</label>
            <select id="planoEmp">
                <option value="49.90|50000">Plano Bronze (R$ 50k / DIT 3k)</option>
                <option value="69.90|100000">Plano Prata (R$ 100k / DIT 3k)</option>
                <option value="79.90|120000">Plano Ouro (R$ 120k / DIT 3k)</option>
            </select>
        </div>
    </div>

    <button class="btn-calc" onclick="gerarSimulacao()">GERAR ESTUDO TÉCNICO</button>

    <div id="areaSimulacao">
        <div id="pdfArea" class="pdf-content">
            <div id="resCabecalho" style="text-align:center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px;"></div>
            <table class="resumo-table">
                <thead><tr><th>Cobertura</th><th>Capital Segurado</th></tr></thead>
                <tbody id="listaCoberturas"></tbody>
            </table>
            <div id="resTexto"></div>
            <div id="resPreco" style="text-align:right; font-weight:800; font-size:1.4rem; border-top: 2px solid #eee; padding-top:15px; margin-top:20px;"></div>
        </div>
        <div class="action-buttons">
            <button id="btnEnviarCliente" class="btn-action" onclick="enviarSimulacaoWhatsApp()" style="background: var(--gold); color: white; display: none;">ENVIAR PARA O CLIENTE</button>
            <a href="#" id="linkConsultor" class="btn-action" style="background: #e2e8f0; color: var(--primary);" target="_blank"><i class="fa-solid fa-user-tie"></i> FALAR COM CONSULTOR</a>
        </div>
    </div>
</div>

<script>
    // MATRIZ DE PREÇOS
    const TABELA_PRECOS = {"14": {"bronze": 67.3, "prata": 117.67, "ouro": 208.91}, "30": {"bronze": 67.3, "prata": 117.67, "ouro": 208.91}, "31": {"bronze": 68.41, "prata": 119.63, "ouro": 212.33}, "32": {"bronze": 69.45, "prata": 121.43, "ouro": 215.92}, "33": {"bronze": 70.63, "prata": 123.49, "ouro": 219.25}, "34": {"bronze": 72.31, "prata": 126.41, "ouro": 224.50}, "35": {"bronze": 74.05, "prata": 129.46, "ouro": 229.96}, "36": {"bronze": 75.97, "prata": 132.8, "ouro": 235.91}, "37": {"bronze": 78.05, "prata": 136.47, "ouro": 242.43}, "38": {"bronze": 80.4, "prata": 140.66, "ouro": 249.88}, "39": {"bronze": 83.02, "prata": 145.39, "ouro": 258.29}, "40": {"bronze": 85.84, "prata": 150.46, "ouro": 267.31}, "41": {"bronze": 89.02, "prata": 156.26, "ouro": 277.62}, "42": {"bronze": 92.59, "prata": 162.8, "ouro": 289.24}, "43": {"bronze": 96.66, "prata": 170.31, "ouro": 302.59}, "44": {"bronze": 101.02, "prata": 178.35, "ouro": 316.89}, "45": {"bronze": 105.79, "prata": 187.19, "ouro": 332.6}, "46": {"bronze": 110.88, "prata": 196.62, "ouro": 349.37}, "47": {"bronze": 116.41, "prata": 206.89, "ouro": 367.63}, "48": {"bronze": 122.2, "prata": 217.61, "ouro": 386.69}, "49": {"bronze": 128.84, "prata": 229.82, "ouro": 408.39}, "50": {"bronze": 135.94, "prata": 242.89, "ouro": 431.62}, "51": {"bronze": 143.35, "prata": 256.44, "ouro": 455.71}, "52": {"bronze": 151.21, "prata": 270.77, "ouro": 481.18}, "53": {"bronze": 159.55, "prata": 285.95, "ouro": 508.17}, "54": {"bronze": 168.26, "prata": 301.74, "ouro": 536.23}, "55": {"bronze": 177.57, "prata": 318.57, "ouro": 566.15}, "56": {"bronze": 187.66, "prata": 336.75, "ouro": 598.47}, "57": {"bronze": 198.54, "prata": 356.31, "ouro": 633.25}, "58": {"bronze": 210.3, "prata": 377.37, "ouro": 670.68}, "59": {"bronze": 215.11, "prata": 400.48, "ouro": 711.77}, "60": {"bronze": 237.63, "prata": 426.36, "ouro": 757.77}, "61": {"bronze": 253.77, "prata": 455.35, "ouro": 809.32}, "62": {"bronze": 272.12, "prata": 489.03, "ouro": 869.18}, "63": {"bronze": 292.91, "prata": 525.89, "ouro": 934.71}, "64": {"bronze": 316.39, "prata": 568.48, "ouro": 1010.42}, "65": {"bronze": 342.87, "prata": 616.53, "ouro": 1095.84}};

    // MÁSCARA WHATSAPP
    const handlePhone = (event) => {
        let input = event.target;
        input.value = phoneMask(input.value);
    }
    const phoneMask = (value) => {
        if (!value) return "";
        value = value.replace(/\D/g, '');
        value = value.replace(/(\d{2})(\d)/, "($1) $2");
        value = value.replace(/(\d{5})(\d)/, "$1-$2");
        return value;
    }
    document.getElementById('whatsInd').addEventListener('keyup', handlePhone);
    document.getElementById('whatsEmp').addEventListener('keyup', handlePhone);

    // VALIDAÇÃO WHATSAPP REAL
    function validarWhats(num) {
        const cleanNum = num.replace(/\D/g, '');
        if (cleanNum.length !== 11) return false;
        // Evita números como 00000000000, 11111111111...
        if (/^(\d)\1+$/.test(cleanNum)) return false;
        // Evita sequências 123456789...
        if (cleanNum === "12345678901") return false;
        return true;
    }

    function switchType(type) {
        document.getElementById('btnInd').classList.toggle('active', type === 'IND');
        document.getElementById('btnEmp').classList.toggle('active', type === 'EMP');
        document.getElementById('formInd').style.display = type === 'IND' ? 'block' : 'none';
        document.getElementById('formEmp').style.display = type === 'EMP' ? 'block' : 'none';
        document.getElementById('areaSimulacao').style.display = 'none';
    }

    function gerarSimulacao() {
        const modo = document.getElementById('btnInd').classList.contains('active') ? 'IND' : 'EMP';
        let nome, whats, precoFinal, capMorte, capRenda, tabelaHtml, explicacaoHtml;

        if (modo === 'IND') {
            nome = document.getElementById('nomeInd').value.trim();
            whats = document.getElementById('whatsInd').value.trim();
            let idade = parseInt(document.getElementById('idadeInd').value);
            let plano = document.getElementById('planoInd').value;
            let cupom = document.getElementById('cupomInd').value.trim().toUpperCase();

            if(!nome || isNaN(idade)) { alert("Preencha Nome e Idade."); return; }
            if(!validarWhats(whats)) { 
                document.getElementById('whatsInd').classList.add('invalid');
                alert("Por favor, informe um WhatsApp verdadeiro com DDD (11 dígitos)."); 
                return; 
            } else {
                document.getElementById('whatsInd').classList.remove('invalid');
            }

            let valorBase = TABELA_PRECOS[idade] ? TABELA_PRECOS[idade][plano] : TABELA_PRECOS[65][plano];
            let valorExibido = (cupom === "UNIMED08") ? valorBase : (valorBase / 0.65);

            capRenda = (plano === 'bronze' ? 3000 : plano === 'prata' ? 5000 : 10000);
            capMorte = (plano === 'bronze' ? 50000 : plano === 'prata' ? 100000 : 120000);
            
            let vMorte = `R$ ${capMorte.toLocaleString('pt-BR')},00`;
            let vMorteAc = `R$ ${(capMorte*2).toLocaleString('pt-BR')},00`;
            let vRenda = `R$ ${capRenda.toLocaleString('pt-BR')},00`;
            let vDiaria = (capRenda / 30).toLocaleString('pt-BR', {minimumFractionDigits: 2});
            let vTotal60 = ((capRenda / 30) * 53).toLocaleString('pt-BR', {minimumFractionDigits: 2});

            precoFinal = `R$ ${valorExibido.toFixed(2)}/mês`;
            
            tabelaHtml = `<tr><td>Morte Natural</td><td class="val-destaque">${vMorte}</td></tr><tr><td>Morte por Acidente</td><td class="val-destaque">${vMorteAc}</td></tr><tr><td>Invalidez por Acidente ou Doença</td><td class="val-destaque">${vMorte}</td></tr><tr><td>Renda p/ Afastamento (SERIT)</td><td class="val-destaque">${vRenda}</td></tr>`;
            explicacaoHtml = `<div class="highlight-box">Seu estudo ficou da seguinte forma: Se ocorrer <b>morte natural</b> a seguradora pagará uma indenização no valor de ${vMorte}. Se ocorrer <b>morte por acidente</b>, a Seguros Unimed pagará uma indenização no valor de ${vMorteAc}. Se ocorrer uma <b>invalidez por acidente ou doença</b> a Seguros Unimed pagará uma indenização no valor de ${vMorte}.<br><br><b>SERIT :</b> Se você ficar doente ou sofrer um acidente e precisar ficar afastado por mais de 7 dias a Seguros Unimed pagará uma renda no valor de ${vRenda} por mes. A indenização é paga por dia de afastamento. Para saber o valor exato da indenizaçao voce fara o seguinte calculo: Valor do beneficio mensal ${vRenda} dividido por 30 dias <i>"por que a seguradora paga por dia de afastamento"</i> <b>R$ ${vDiaria} por dia</b>. Em seguida voce multiplica a diaria R$ ${vDiaria} pelos dias de afastamento <i>descontando a franquia de 7 dias</i> total <b>R$ ${vTotal60} líquido</b>. Quando prorroga o afastamento pelo mesmo cid nao tem franquia.<br><br><b>Carencias:</b> Doenças comuns 30 dias. LER, DORT, LTC, DOENÇAS PROGRESSIVAS , DEGENERATIVAS, HERNIAS 180 dias. <b>Acidente nao tem carencia</b>.</div>`;
        } else {
            nome = document.getElementById('nomeEmp').value.trim();
            whats = document.getElementById('whatsEmp').value.trim();
            let vidas = parseInt(document.getElementById('vidasEmp').value);
            let combo = document.getElementById('planoEmp').value.split('|');
            
            if(!nome || vidas < 3) { alert("Nome da Empresa e mínimo de 3 vidas obrigatórios."); return; }
            if(!validarWhats(whats)) { 
                document.getElementById('whatsEmp').classList.add('invalid');
                alert("Informe um WhatsApp verdadeiro com DDD."); 
                return; 
            }

            capMorte = parseInt(combo[1]);
            let vMorte = `R$ ${capMorte.toLocaleString('pt-BR')},00`;
            let vMorteAc = `R$ ${(capMorte*2).toLocaleString('pt-BR')},00`;
            let vTotal60 = ((3000 / 30) * 45).toLocaleString('pt-BR', {minimumFractionDigits: 2});
            precoFinal = `R$ ${(parseFloat(combo[0]) * vidas).toFixed(2)} (${vidas} vidas)`;

            tabelaHtml = `<tr><td>Morte Natural</td><td class="val-destaque">${vMorte}</td></tr><tr><td>Morte por Acidente</td><td class="val-destaque">${vMorteAc}</td></tr><tr><td>Invalidez por Acidente ou Doença</td><td class="val-destaque">${vMorte}</td></tr><tr><td>DIT Acidente (Renda)</td><td class="val-destaque">R$ 3.000,00</td></tr>`;
            explicacaoHtml = `<div class="highlight-box"><b>Morte:</b> Se ocorrer Morte Natural a Seguros Unimed pagara uma indenizaçao no valor de ${vMorte}. <b>Morte Acidental:</b> No valor de ${vMorteAc}.<br><br><b>Invalidez por Acidente ou Doença:</b> A Seguros Unimed pagara uma indenizaçao de ${vMorte}.<br><br><b>DIT:</b> Se ocorrer um acidente e ficar incapacitado por mais de 15 dias a Seguros Unimed pagará uma renda de R$ 3.000,00 por mês.<br><br><b>Exemplo (60 dias):</b> R$ 3.000,00 / 30 dias = R$ 100,00 por dia. Multiplicado por 45 dias pagos (pós franquia) = <b>R$ ${vTotal60} líquido</b>.</div>`;
        }

        document.getElementById('resCabecalho').innerHTML = `<h3>ESTUDO TÉCNICO UNIMED</h3><p>Para: <b>${nome}</b></p>`;
        document.getElementById('listaCoberturas').innerHTML = tabelaHtml;
        document.getElementById('resTexto').innerHTML = explicacaoHtml;
        document.getElementById('resPreco').innerText = precoFinal;
        document.getElementById('areaSimulacao').style.display = 'block';
    }

    function enviarSimulacaoWhatsApp() {
        const whatsInput = document.getElementById('btnInd').classList.contains('active') ? 'whatsInd' : 'whatsEmp';
        const whats = document.getElementById(whatsInput).value.replace(/\D/g,'');
        const preco = document.getElementById('resPreco').innerText;
        let msg = `*EAS CORRETORA - PROTEÇÃO UNIMED*\n\nSeu estudo está pronto!\n💰 *INVESTIMENTO:* ${preco}\n\nConfira os detalhes no link que te enviei.`;
        window.open(`https://wa.me/55${whats}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
