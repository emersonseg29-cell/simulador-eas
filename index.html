<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAS Corretora - Simulador Consultivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1d2d44; --gold: #b89b3e; --unimed: #00995d; --text: #334155; }
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: var(--text); margin: 0; display: flex; justify-content: center; padding: 10px; }
        .container { width: 100%; max-width: 500px; padding: 20px; text-align: center; }
        .logo { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--gold); margin-bottom: 15px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); margin: 0; font-size: 1.6rem; font-weight: 800; }
        .sub { color: var(--gold); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px; }
        
        .input-group { margin-bottom: 18px; text-align: left; }
        label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
        input, select { width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; box-sizing: border-box; background: #f8fafc; outline: none; color: var(--text); }
        
        .btn-calc { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 10px; box-shadow: 0 10px 20px rgba(29, 45, 68, 0.2); }

        #resultado { display: none; margin-top: 35px; border-top: 2px solid #f1f5f9; padding-top: 25px; text-align: left; }
        
        /* Estilo do Texto Descritivo */
        .descritivo-texto { background: #f8fafc; padding: 25px; border-radius: 20px; border-left: 6px solid var(--unimed); line-height: 1.6; color: #1e293b; font-size: 0.95rem; }
        .descritivo-texto b { color: var(--primary); }
        .highlight-box { background: #f0fdf4; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid var(--unimed); }
        
        .premio-final { background: var(--primary); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; }
        .premio-final span { font-size: 1.8rem; font-weight: 800; display: block; color: var(--gold); }

        .btn-whats { display: flex; align-items: center; justify-content: center; gap: 10px; background: #25d366; color: white; text-decoration: none; padding: 20px; border-radius: 12px; font-weight: 700; font-size: 1.1rem; margin-top: 20px; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2); }
    </style>
</head>
<body>

<div class="container">
    <img src="logo oficial.jpg.png" class="logo" alt="EAS Corretora">
    <h2>EAS CORRETORA</h2>
    <div class="sub">Simulador de Proteção de Renda</div>

    <div class="input-group">
        <label>Qual sua idade?</label>
        <input type="number" id="idade" placeholder="Ex: 35">
    </div>

    <div class="input-group">
        <label>Profissão</label>
        <select id="profissao">
            <option value="empresario">Empresário / MEI</option>
            <option value="advogado">Advogados</option>
            <option value="saude">Médicos / Dentistas</option>
            <option value="outros">Outras Profissões</option>
        </select>
    </div>

    <div class="input-group">
        <label>Renda Mensal Desejada</label>
        <select id="beneficio">
            <option value="3000">R$ 3.000,00</option>
            <option value="6000">R$ 6.000,00</option>
            <option value="9000" selected>R$ 9.000,00</option>
        </select>
    </div>

    <div class="input-group">
        <label>Cupom (opcional)</label>
        <input type="text" id="cupom" placeholder="Ex: EAS">
    </div>

    <button class="btn-calc" onclick="gerarEstudo()">GERAR ESTUDO TÉCNICO</button>

    <div id="resultado">
        <div class="descritivo-texto" id="textoEstudo">
            </div>

        <div class="premio-final">
            PRÊMIO MENSAL:
            <span id="valorPremio">R$ 0,00</span>
        </div>

        <a href="" id="resWhats" class="btn-whats">
            <i class="fa-brands fa-whatsapp"></i> CONTRATAR COM CONSULTOR
        </a>
    </div>
</div>

<script>
    function gerarEstudo() {
        const idade = parseInt(document.getElementById('idade').value);
        const benef = parseInt(document.getElementById('beneficio').value);
        const prof = document.getElementById('profissao').value;
        const cupom = document.getElementById('cupom').value.trim().toUpperCase();

        if(!idade) return alert("Por favor, informe a idade.");

        // Capitais de Morte (Baseado em 100k para plano de 9k proporcionalmente)
        const capBase = (benef === 9000) ? 100000 : (benef === 6000 ? 60000 : 30000);
        const capAcidente = capBase * 2;

        // Cálculos SERIT
        const diaria = (benef / 30).toFixed(2);
        const diasLiquidos = 60 - 7;
        const totalIndenizacao = (diasLiquidos * diaria).toFixed(2);

        // Lógica de Preço
        const precosPadrao = { 3000: 120.79, 6000: 240.15, 9000: 340.00 };
        const precosPromo = { 3000: 74.05, 6000: 148.12, 9000: 211.30 };
        const precoFinal = (cupom === "EAS") ? precosPromo[benef] : precosPadrao[benef];

        // Montagem do Texto
        let texto = `
            <p>Se ocorrer <b>morte natural</b> a seguradora pagará uma indenização no valor de <b>R$ ${capBase.toLocaleString('pt-BR')},00</b>.</p>
            
            <p>Se ocorrer <b>morte por acidente</b>, a Seguros Unimed pagará uma indenização no valor de <b>R$ ${capAcidente.toLocaleString('pt-BR')},00</b>.</p>
            
            <p>Se ocorrer uma <b>invalidez por acidente ou doença</b> a Seguros Unimed pagará uma indenização no valor de <b>R$ ${capBase.toLocaleString('pt-BR')},00</b>.</p>
            
            <p><b>SERIT:</b> Se você ficar doente ou sofrer um acidente e precisar ficar afastado por mais de 7 dias a Seguros Unimed pagará uma renda no valor de <b>R$ ${benef.toLocaleString('pt-BR')},00 por mês</b>.</p>
            
            <div class="highlight-box">
                <b>EXEMPLO PRÁTICO (60 DIAS):</b><br>
                Suponhamos que você receba um atestado de 60 dias. Calculamos sua diária (R$ ${benef.toLocaleString('pt-BR')},00 ÷ 30 dias) = <b>R$ ${diaria.replace('.',',')} por dia</b>.<br><br>
                Multiplicamos a diária pelos dias de afastamento descontando a franquia de 7 dias (53 dias pagos).<br>
                <b>Total da Indenização: R$ ${parseFloat(totalIndenizacao).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</b>.
            </div>

            <p><small>* Quando prorroga o afastamento pelo mesmo CID não tem franquia.</small></p>
            
            <p><b>CARÊNCIAS:</b><br>
            • Doenças comuns: <b>30 dias</b>.<br>
            • LER, DORT, LTC, Doenças Progressivas, Degenerativas e Hérnias: <b>180 dias</b>.<br>
            • Acidentes: <b>Não tem carência</b>.</p>
        `;

        if(prof === 'saude') {
            texto = `<div style="color:var(--unimed); font-weight:bold; margin-bottom:15px;">✓ Vantagem: Dispensa de comprovação de renda ativada!</div>` + texto;
        }

        document.getElementById('textoEstudo').innerHTML = texto;
        document.getElementById('valorPremio').innerText = `R$ ${precoFinal.toFixed(2)}`;
        
        const msg = `Olá! Fiz a simulação EAS (Plano R$ ${benef}). Idade: ${idade} anos. Gostaria de contratar.`;
        document.getElementById('resWhats').href = `https://wa.me/5517997165139?text=${encodeURIComponent(msg)}`;
        
        document.getElementById('resultado').style.display = "block";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
