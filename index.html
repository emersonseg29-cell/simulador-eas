<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAS Corretora - Simulador Oficial Unimed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #1d2d44; --gold: #b89b3e; --unimed: #00995d; --text: #334155; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: #ffffff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .logo-img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--gold); margin: 0 auto 15px; display: block; object-fit: cover; }
        h2 { color: var(--primary); text-align: center; margin: 0; font-size: 1.5rem; }
        .sub { color: var(--gold); text-align: center; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 25px; }
        
        .type-selector { display: flex; background: #e2e8f0; border-radius: 12px; padding: 5px; margin-bottom: 25px; }
        .type-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; color: #64748b; background: transparent; }
        .type-btn.active { background: var(--primary); color: white; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 5px; }
        input, select { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; box-sizing: border-box; outline: none; }
        
        .btn-calc { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        
        #areaSimulacao { display: none; margin-top: 30px; }
        .pdf-content { padding: 30px; border: 1px solid #eee; border-radius: 15px; background: #fff; line-height: 1.7; font-size: 0.95rem; }
        .highlight-box { background: #f0fdf4; padding: 20px; border-radius: 12px; margin: 15px 0; border: 1px solid var(--unimed); }
        
        .action-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-action { flex: 1; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.9rem; border: none; cursor: pointer; }
        .btn-consultor { background: #e2e8f0; color: var(--primary); }
        .btn-contratar { background: #25d366; color: white; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo oficial.jpg.png" class="logo-img">
    <h2>EAS CORRETORA</h2>
    <div class="sub">Simulador de Proteção Unimed</div>

    <div class="type-selector">
        <button class="type-btn active" id="btnInd" onclick="switchType('IND')">INDIVIDUAL</button>
        <button class="type-btn" id="btnEmp" onclick="switchType('EMP')">EMPRESARIAL</button>
    </div>

    <div id="formInd">
        <div class="input-group"><label>Nome do Cliente</label><input type="text" id="nomeInd" placeholder="Nome Completo"></div>
        <div class="input-group"><label>WhatsApp</label><input type="tel" id="whatsInd" placeholder="(17) 99999-9999"></div>
        <div class="input-group"><label>Idade (16 a 70 anos)</label><input type="number" id="idadeInd" placeholder="Ex: 35"></div>
        <div class="input-group">
            <label>Plano Individual (SERIT)</label>
            <select id="planoInd">
                <option value="3000|50000">Bronze (3k SERIT + 50k Morte)</option>
                <option value="6000|100000">Prata (6k SERIT + 100k Morte)</option>
                <option value="9000|100000" selected>Ouro (9k SERIT + 100k Morte)</option>
            </select>
        </div>
    </div>

    <div id="formEmp" style="display:none;">
        <div class="input-group"><label>Nome da Empresa (Razão Social)</label><input type="text" id="nomeEmp" placeholder="Nome da Empresa"></div>
        <div class="input-group"><label>WhatsApp de Contato</label><input type="tel" id="whatsEmp" placeholder="(17) 99999-9999"></div>
        <div class="input-group"><label>Nº de Vidas (Mínimo 3 vidas)</label><input type="number" id="vidasEmp" value="3" min="1"></div>
        <div class="input-group">
            <label>Plano Empresarial</label>
            <select id="planoEmp">
                <option value="49.90|50000|BRONZE">Bronze (Morte 50k) - R$ 49,90/vida</option>
                <option value="69.90|100000|PRATA">Prata (Morte 100k) - R$ 69,90/vida</option>
                <option value="79.90|100000|OURO">Ouro (Morte 100k) - R$ 79,90/vida</option>
            </select>
        </div>
    </div>

    <button class="btn-calc" onclick="gerarSimulacao()">GERAR ESTUDO TÉCNICO</button>

    <div id="areaSimulacao">
        <div id="pdfArea" class="pdf-content">
            <div id="resCabecalho" style="text-align:center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px;"></div>
            <div id="resTexto"></div>
            <div id="resPreco" style="text-align:right; font-weight:800; font-size:1.4rem; border-top: 2px solid #eee; padding-top:15px; margin-top:20px;"></div>
            <div style="text-align:center; margin-top: 30px; font-size: 0.8rem; color: #94a3b8; border-top: 1px dashed #eee; padding-top: 10px;">
                <b>EAS Corretora de Seguros</b> | Emerson: (17) 99716-5139
            </div>
        </div>
        <div class="action-buttons">
            <button class="btn-action btn-consultor" onclick="baixarPDF()"><i class="fa-solid fa-file-pdf"></i> FALAR COM CONSULTOR</button>
            <a href="#" id="linkContratar" class="btn-action btn-contratar" target="_blank"><i class="fa-solid fa-cart-shopping"></i> CONTRATAR AGORA</a>
        </div>
    </div>
</div>

<script>
    let modo = 'IND';

    function switchType(type) {
        modo = type;
        document.getElementById('btnInd').classList.toggle('active', type === 'IND');
        document.getElementById('btnEmp').classList.toggle('active', type === 'EMP');
        document.getElementById('formInd').style.display = type === 'IND' ? 'block' : 'none';
        document.getElementById('formEmp').style.display = type === 'EMP' ? 'block' : 'none';
        document.getElementById('areaSimulacao').style.display = 'none';
    }

    function gerarSimulacao() {
        let nome, whats, texto, precoFinal, msgWhats;

        if (modo === 'IND') {
            nome = document.getElementById('nomeInd').value;
            whats = document.getElementById('whatsInd').value.replace(/\D/g,'');
            const idade = document.getElementById('idadeInd').value;
            const combo = document.getElementById('planoInd').value.split('|');
            const serit = parseInt(combo[0]);
            const morte = parseInt(combo[1]);

            if(!nome || !idade) return alert("Preencha Nome e Idade.");

            let total = ((morte/1000)*0.55) + ((serit/1000)*35) + 1.44;
            precoFinal = `R$ ${total.toFixed(2)}/mês`;
            
            texto = `
                <p><b>Morte Natural / Invalidez:</b> R$ ${morte.toLocaleString('pt-BR')},00</p>
                <p><b>Morte Acidental (Capital Dobrado):</b> R$ ${(morte*2).toLocaleString('pt-BR')},00</p>
                <p><b>SERIT (Renda Mensal):</b> R$ ${serit.toLocaleString('pt-BR')},00.</p>
                <div class="highlight-box">
                    <b>EXEMPLO PRÁTICO (60 DIAS):</b><br>
                    Suponhamos que receba um atestado de 60 dias. A seguradora paga por dia de afastamento.<br><br>
                    Para saber o valor exato da indenização você deve calcular o valor do benefício mensal R$ ${serit.toLocaleString('pt-BR')},00 dividido por 30 dias = R$ ${(serit/30).toFixed(2).replace('.',',')} por dia.<br><br>
                    Em seguida multiplique a diária pelos 53 dias pagos (descontada franquia de 7 dias).<br>
                    <b>Total da Indenização: R$ ${((serit/30)*53).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</b>.
                </div>
            `;
            msgWhats = `Olá ${nome}, segue proposta Individual Unimed.`;

        } else {
            nome = document.getElementById('nomeEmp').value;
            whats = document.getElementById('whatsEmp').value.replace(/\D/g,'');
            const vidas = parseInt(document.getElementById('vidasEmp').value);
            const comboEmp = document.getElementById('planoEmp').value.split('|');
            const precoVida = parseFloat(comboEmp[0]);
            const capitalMorte = parseInt(comboEmp[1]);
            const nomeP = comboEmp[2];

            // TRAVA DE MÍNIMO DE 3 VIDAS
            if (vidas < 3) return alert("Para o plano empresarial, o número mínimo de vidas é 3.");
            if(!nome) return alert("Preencha o Nome da Empresa.");

            const totalEmp = precoVida * vidas;
            precoFinal = `TOTAL MENSAL: R$ ${totalEmp.toFixed(2)} (${vidas} vidas)`;

            texto = `
                <p><b>Plano Empresarial Unimed - ${nomeP}</b></p>
                <p><b>Morte:</b> Se ocorrer morte natural, a Seguros Unimed pagará uma indenização no valor de <b>R$ ${capitalMorte.toLocaleString('pt-BR')},00</b>.</p>
                <p><b>Morte Acidental:</b> Se ocorrer por acidente seus beneficiários receberão uma indenização no valor de <b>R$ ${(capitalMorte*2).toLocaleString('pt-BR')},00</b>.</p>
                <p><b>IPA:</b> Se ocorrer uma invalidez permanente parcial ou total por acidente, a Seguros Unimed pagará uma indenização no valor de <b>R$ ${capitalMorte.toLocaleString('pt-BR')},00</b>.</p>
                <p><b>IFPD:</b> Se ocorrer uma invalidez permanente total e funcional por doença a terei direito a receber uma indenização no valor de <b>R$ ${capitalMorte.toLocaleString('pt-BR')},00</b>.</p>
                <p><b>DIT:</b> Se sofrer um acidente a seguros Unimed pagará uma renda mensal no valor de <b>R$ 3.000,00 (3 mil reais)</b>.</p>
                <div class="highlight-box">
                    <b>REGRAS DO DIT EMPRESARIAL:</b><br>
                    • O limite de indenização para essa cobertura é de 12 meses se for ininterrupto.<br>
                    • Para acionar a cobertura de DIT (Diária por incapacidade temporária) o afastamento precisa ser superior a 15 dias.<br>
                    • <b>Garantia Funeral Familiar:</b> Assistência completa para Titular, Cônjuge e Filhos (até 21 anos).<br>
                    <br>
                    <b>IMPORTANTE:</b> A inclusão de prestadores de serviço está sujeita à análise prévia da seguradora.
                </div>
            `;
            msgWhats = `Olá, gostaria de contratar o Plano Empresarial (${nomeP}) para a empresa ${nome} (${vidas} vidas).`;
        }

        document.getElementById('resCabecalho').innerHTML = `<h3>ESTUDO TÉCNICO PERSONALIZADO</h3><p>Preparado para: <b>${nome}</b></p>`;
        document.getElementById('resTexto').innerHTML = texto;
        document.getElementById('resPreco').innerText = precoFinal;
        document.getElementById('linkContratar').href = `https://wa.me/55${whats}?text=${encodeURIComponent(msgWhats)}`;
        document.getElementById('areaSimulacao').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function baixarPDF() {
        const element = document.getElementById('pdfArea');
        html2pdf().set({ margin: 15, filename: 'Estudo_EAS.pdf', html2canvas: { scale: 2 }, jsPDF: { format: 'a4' } }).from(element).save();
    }
</script>
</body>
</html>
