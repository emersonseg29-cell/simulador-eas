<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultoria Técnica EAS Corretora & Seguros Unimed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1d2d44; --gold: #b89b3e; --unimed: #00995d; --text: #334155; --error: #e11d48; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: #ffffff; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 8px solid var(--gold); }
        
        .header { text-align: center; margin-bottom: 25px; }
        .logo-img { width: 100%; max-width: 320px; height: auto; display: block; margin: 0 auto; object-fit: contain; }
        
        h1 { color: var(--primary); font-size: 1.4rem; margin: 15px 0 0; font-weight: 800; }
        .sub-header { color: var(--gold); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .type-selector { display: flex; background: #e2e8f0; border-radius: 12px; padding: 5px; margin: 20px 0; }
        .type-btn { flex: 1; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; color: #64748b; background: transparent; transition: 0.3s; }
        .type-btn.active { background: var(--primary); color: white; }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.75rem; font-weight: 800; color: #475569; margin-bottom: 6px; text-transform: uppercase; }
        input, select { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); }
        input.invalid { border-color: var(--error); background: #fff1f2; }

        .btn-calc { width: 100%; padding: 22px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 800; cursor: pointer; box-shadow: 0 4px 15px rgba(29, 45, 68, 0.25); }
        
        #resultado { display: none; margin-top: 30px; padding: 25px; border-radius: 18px; background: #f8fafc; border: 1px solid #e2e8f0; }
        .val-total { font-size: 2rem; color: var(--unimed); font-weight: 800; text-align: center; margin: 5px 0 15px; }
        .val-original { text-decoration: line-through; color: #94a3b8; font-size: 1rem; display: block; text-align: center; margin-top: 10px; }
        .label-promo { display: block; text-align: center; color: var(--gold); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; }

        .explicacao-matadora { background: #f0fdf4; border-left: 5px solid var(--unimed); padding: 20px; border-radius: 12px; margin-top: 20px; font-size: 0.95rem; line-height: 1.6; text-align: justify; }
        .explicacao-matadora b { color: var(--primary); }

        .disclaimer { font-size: 0.7rem; color: #94a3b8; text-align: center; margin-top: 25px; line-height: 1.4; font-style: italic; }
        
        .whatsapp-btn { width: 100%; padding: 18px; background: #25d366; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; text-decoration: none; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo oficial.jpg.png" class="logo-img" alt="EAS Corretora">
        <h1>Simulador de Proteção</h1>
        <div class="sub-header">Consultoria Técnica EAS Corretora & Seguros Unimed</div>
    </div>

    <div class="type-selector">
        <button class="type-btn active" id="btnInd" onclick="setModo('IND')">INDIVIDUAL</button>
        <button class="type-btn" id="btnEmp" onclick="setModo('EMP')">EMPRESARIAL</button>
    </div>

    <div class="input-group">
        <label>Nome do Cliente</label>
        <input type="text" id="nome" placeholder="Ex: João Silva">
    </div>
    <div class="input-group">
        <label>WhatsApp (DDD + Número)</label>
        <input type="tel" id="whatsapp" placeholder="(00) 00000-0000" maxlength="15">
    </div>

    <div id="campos-ind">
        <div class="input-group">
            <label>Profissão</label>
            <select id="profissao">
                <option value="">Selecione...</option>
                <option value="Médico">Médico(a)</option>
                <option value="Advogado">Advogado(a)</option>
                <option value="Empresário">Empresário(a)</option>
                <option value="Autônomo">Autônomo / Liberal</option>
                <option value="Outros">Outras Profissões</option>
            </select>
        </div>
        <div class="input-group">
            <label>Idade do Segurado (Máx 70 anos)</label>
            <input type="number" id="idade" placeholder="Ex: 43">
        </div>
        <div class="input-group">
            <label>Plano (Foco Renda SERIT)</label>
            <select id="planoInd">
                <option value="ouro">Plano OURO: Renda 10k + Morte 120k</option>
                <option value="prata">Plano PRATA: Renda 5k + Morte 100k</option>
                <option value="bronze">Plano BRONZE: Renda 3k + Morte 50k</option>
            </select>
        </div>
        <div class="input-group">
            <label>Código do Consultor</label>
            <input type="text" id="cupom" placeholder="Insira o código se houver">
        </div>
    </div>

    <div id="campos-emp" style="display:none;">
        <div class="input-group">
            <label>Nº de Vidas (Mínimo 3)</label>
            <input type="number" id="vidas" value="3">
        </div>
        <div class="input-group">
            <label>Investimento por Vida</label>
            <select id="planoEmp">
                <option value="79.90|120000">Empresarial Ouro (R$ 79,90/vida)</option>
                <option value="69.90|100000">Empresarial Prata (R$ 69,90/vida)</option>
                <option value="49.90|50000">Empresarial Bronze (R$ 49,90/vida)</option>
            </select>
        </div>
    </div>

    <button class="btn-calc" onclick="calcular()">GERAR ESTUDO TÉCNICO</button>

    <div id="resultado">
        <div id="res-texto-topo"></div>
        <span class="val-original" id="res-original"></span>
        <span class="label-promo" id="res-label-promo"></span>
        <div class="val-total" id="res-valor"></div>
        
        <div class="explicacao-matadora" id="res-explicacao"></div>

        <a href="#" id="wa-link" class="whatsapp-btn" target="_blank">
            <i class="fab fa-whatsapp"></i> ENVIAR CONSULTORIA AO WHATSAPP
        </a>
    </div>

    <div class="disclaimer">
        * Simulação informativa. Após 70 anos a aceitação é bloqueada. Valores sujeitos a alteração conforme análise de saúde da Seguros Unimed.
    </div>
</div>

<script>
    let modoAtual = 'IND';

    document.getElementById('whatsapp').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !v[2] ? v[1] : '(' + v[1] + ') ' + v[2] + (v[3] ? '-' + v[3] : '');
    });

    function setModo(modo) {
        modoAtual = modo;
        document.getElementById('btnInd').classList.toggle('active', modo === 'IND');
        document.getElementById('btnEmp').classList.toggle('active', modo === 'EMP');
        document.getElementById('campos-ind').style.display = modo === 'IND' ? 'block' : 'none';
        document.getElementById('campos-emp').style.display = modo === 'EMP' ? 'block' : 'none';
        document.getElementById('resultado').style.display = 'none';
    }

    function calcular() {
        const nome = document.getElementById('nome').value.trim();
        const cleanWhats = document.getElementById('whatsapp').value.replace(/\D/g, '');

        if (!nome || cleanWhats.length !== 11) {
            alert("Por favor, preencha o nome e um WhatsApp válido com DDD.");
            return;
        }

        if (modoAtual === 'IND') {
            const idade = parseInt(document.getElementById('idade').value);
            if (idade > 70) { alert("Infelizmente a idade máxima para contratação é 70 anos."); return; }
            if (idade < 14 || isNaN(idade)) { alert("Idade inválida."); return; }
        } else {
            if (parseInt(document.getElementById('vidas').value) < 3) {
                alert("O Plano Empresarial exige o mínimo de 3 vidas.");
                return;
            }
        }

        processar(nome, cleanWhats);
    }

    function processar(nome, whats) {
        let precoPromo, precoNormal, morte, renda;
        const cupomDigitado = document.getElementById('cupom').value.toUpperCase();
        
        if (modoAtual === 'IND') {
            const plano = document.getElementById('planoInd').value;
            // Exemplo baseado na lógica 43 anos: Ouro CALL08 (308,75) vs A-37 1 (521,71)
            let baseCALL08 = 308.75;
            if(plano === 'prata') baseCALL08 = 196.62;
            if(plano === 'bronze') baseCALL08 = 110.88;

            precoNormal = baseCALL08 * 1.69;
            precoPromo = (cupomDigitado === 'UNIMED08') ? baseCALL08 : precoNormal;
            
            morte = (plano === 'ouro') ? 120000 : (plano === 'prata' ? 100000 : 50000);
            renda = (plano === 'ouro') ? 10000 : (plano === 'prata' ? 5000 : 3000);
        } else {
            const vidas = parseInt(document.getElementById('vidas').value);
            const p = document.getElementById('planoEmp').value.split('|');
            precoPromo = parseFloat(p[0]) * vidas;
            precoNormal = precoPromo * 1.35;
            morte = parseInt(p[1]);
            renda = 3000;
        }

        const diaria = (renda/30).toLocaleString('pt-BR', {minimumFractionDigits: 2});
        const totalLiquido = (modoAtual === 'IND') ? (renda/30)*53 : (renda/30)*45;

        // EXIBIÇÃO NO SIMULADOR
        document.getElementById('res-texto-topo').innerHTML = `<b>Estudo Técnico para ${nome.toUpperCase()}</b>`;
        document.getElementById('res-original').innerText = `Preço de Mercado: R$ ${precoNormal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}/mês`;
        
        if(cupomDigitado === 'UNIMED08') {
            document.getElementById('res-label-promo').innerText = "CÓDIGO CONSULTOR APLICADO - TABELA ESPECIAL";
            document.getElementById('res-valor').innerText = `R$ ${precoPromo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}/mês`;
        } else {
            document.getElementById('res-label-promo').innerText = "";
            document.getElementById('res-valor').innerText = `R$ ${precoNormal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}/mês`;
        }

        let textoMatador = "";
        if(modoAtual === 'IND') {
            textoMatador = `Se ocorrer <b>morte natural</b> a Seguros Unimed pagará uma indenização de R$ ${morte.toLocaleString('pt-BR')}. Se ocorrer <b>morte por acidente</b>, o valor dobra para R$ ${(morte*2).toLocaleString('pt-BR')}. Caso ocorra <b>invalidez por acidente ou doença</b>, a indenização é de R$ ${morte.toLocaleString('pt-BR')}.<br><br><b>RENDA SERIT:</b> Em caso de afastamento superior a 7 dias, você recebe R$ ${renda.toLocaleString('pt-BR')} por mês. <br><br><b>EXEMPLO MATADOR:</b> Em um atestado de 60 dias, sua diária é de R$ ${diaria}. Você recebe um crédito total de <b>R$ ${totalLiquido.toLocaleString('pt-BR', {minimumFractionDigits: 2})} líquido</b> na sua conta.<br><br><i>Carência zero para acidentes. Doenças comuns 30 dias.</i>`;
        } else {
            textoMatador = `<b>PLANO EMPRESARIAL:</b> Morte Natural de R$ ${morte.toLocaleString('pt-BR')} e Morte Acidental de R$ ${(morte*2).toLocaleString('pt-BR')}. <br><br><b>DIT ACIDENTE:</b> Afastamento por acidente superior a 15 dias gera renda de R$ 3.000,00/mês. <br><br><b>EXEMPLO:</b> 60 dias de afastamento = <b>R$ 4.500,00 líquido</b>.`;
        }
        
        document.getElementById('res-explicacao').innerHTML = textoMatador;
        document.getElementById('resultado').style.display = 'block';

        // MENSAGEM WHATSAPP
        let msg = `*EAS CORRETORA - CONSULTORIA TÉCNICA UNIMED*\n\n`;
        msg += `Olá ${nome.toUpperCase()}, conforme solicitado segue seu estudo:\n\n`;
        msg += `✅ *MORTE NATURAL:* R$ ${morte.toLocaleString('pt-BR')}\n`;
        msg += `✅ *MORTE POR ACIDENTE:* R$ ${(morte*2).toLocaleString('pt-BR')}\n`;
        msg += `✅ *RENDA POR AFASTAMENTO:* R$ ${renda.toLocaleString('pt-BR')}/mês\n\n`;
        msg += `💰 *INVESTIMENTO:* R$ ${precoPromo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}/mês\n\n`;
        msg += `*MATEMÁTICA DO BENEFÍCIO (60 dias):*\n`;
        msg += `Você recebe: *R$ ${totalLiquido.toLocaleString('pt-BR', {minimumFractionDigits: 2})} LÍQUIDO* em conta.\n\n`;
        msg += `_Podemos seguir com sua proteção hoje?_`;

        document.getElementById('wa-link').href = `https://wa.me/55${whats}?text=${encodeURIComponent(msg)}`;
    }
</script>
</body>
</html>
