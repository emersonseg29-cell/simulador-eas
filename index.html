<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAS Corretora - Simulador Oficial Unimed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #1d2d44; --gold: #b89b3e; --unimed: #00995d; --text: #334155; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: #ffffff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .logo-img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--gold); margin: 0 auto 15px; display: block; object-fit: cover; }
        h2 { color: var(--primary); text-align: center; margin: 0; font-size: 1.5rem; }
        .sub { color: var(--gold); text-align: center; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 25px; }
        .type-selector { display: flex; background: #e2e8f0; border-radius: 12px; padding: 5px; margin-bottom: 25px; }
        .type-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; color: #64748b; background: transparent; }
        .type-btn.active { background: var(--primary); color: white; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 5px; }
        input, select { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; box-sizing: border-box; outline: none; }
        .btn-calc { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        #areaSimulacao { display: none; margin-top: 30px; }
        .pdf-content { padding: 30px; border: 1px solid #eee; border-radius: 15px; background: #fff; line-height: 1.7; font-size: 0.95rem; }
        .resumo-table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 0.85rem; }
        .resumo-table th { background: #f1f5f9; color: var(--primary); text-align: left; padding: 10px; border-bottom: 2px solid var(--gold); }
        .resumo-table td { padding: 10px; border-bottom: 1px solid #eee; color: #475569; }
        .val-destaque { font-weight: 800; color: var(--unimed); }
        .highlight-box { background: #f0fdf4; padding: 20px; border-radius: 12px; margin: 15px 0; border: 1px solid var(--unimed); font-size: 0.9rem; }
        .action-buttons { display: grid; gap: 10px; margin-top: 20px; }
        .btn-action { padding: 18px; border-radius: 12px; text-decoration: none; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.95rem; border: none; cursor: pointer; }
        .btn-equipe { background: var(--gold); color: white; display: none; }
        .btn-consultor { background: #e2e8f0; color: var(--primary); }
        .btn-contratar { background: #25d366; color: white; }
        .badge-equipe { background: var(--gold); color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; display: none; margin-bottom: 10px; text-align: center;}
    </style>
</head>
<body>
<div class="container">
    <div id="tagEquipe" class="badge-equipe"><i class="fa-solid fa-unlock"></i> MODO EQUIPE ATIVADO</div>
    <img src="logo oficial.jpg.png" class="logo-img">
    <h2>EAS CORRETORA</h2>
    <div class="sub">Simulador de Proteção Unimed</div>

    <div class="type-selector">
        <button class="type-btn active" id="btnInd" onclick="switchType('IND')">INDIVIDUAL (CPF)</button>
        <button class="type-btn" id="btnEmp" onclick="switchType('EMP')">EMPRESARIAL (PJ)</button>
    </div>

    <div id="formInd">
        <div class="input-group"><label>Nome do Cliente</label><input type="text" id="nomeInd" placeholder="Nome Completo"></div>
        <div class="input-group"><label>WhatsApp do Cliente</label><input type="tel" id="whatsInd" placeholder="(17) 99999-9999"></div>
        <div class="input-group"><label>Idade (16 a 70 anos)</label><input type="number" id="idadeInd" placeholder="Ex: 35"></div>
        <div class="input-group">
            <label>Selecione o Plano de Renda</label>
            <select id="planoInd">
                <option value="3000|50000">Plano Bronze - 3 mil de Renda</option>
                <option value="6000|100000">Plano Prata - 6 mil de Renda</option>
                <option value="9000|108000" selected>Plano Ouro - 9 mil de Renda</option>
            </select>
        </div>
    </div>

    <div id="formEmp" style="display:none;">
        <div class="input-group"><label>Nome da Empresa</label><input type="text" id="nomeEmp" placeholder="Razão Social"></div>
        <div class="input-group"><label>WhatsApp de Contato</label><input type="tel" id="whatsEmp" placeholder="(17) 99999-9999"></div>
        <div class="input-group"><label>Nº de Vidas (Mínimo 3)</label><input type="number" id="vidasEmp" placeholder="Ex: 5"></div>
        <div class="input-group">
            <label>Selecione o Plano Empresarial</label>
            <select id="planoEmp">
                <option value="49.90|50000|BRONZE">Plano Bronze (R$ 49,90 por vida)</option>
                <option value="69.90|100000|PRATA">Plano Prata (R$ 69,90 por vida)</option>
                <option value="79.90|108000|OURO">Plano Ouro (R$ 79,90 por vida)</option>
            </select>
        </div>
    </div>

    <button class="btn-calc" onclick="gerarSimulacao()">GERAR ESTUDO TÉCNICO</button>

    <div id="areaSimulacao">
        <div id="pdfArea" class="pdf-content">
            <div id="resCabecalho" style="text-align:center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px;"></div>
            <table class="resumo-table" id="tabelaCoberturas">
                <thead><tr><th>Cobertura</th><th>Capital Segurado</th></tr></thead>
                <tbody id="listaCoberturas"></tbody>
            </table>
            <div id="resTexto"></div>
            <div id="resPreco" style="text-align:right; font-weight:800; font-size:1.4rem; border-top: 2px solid #eee; padding-top:15px; margin-top:20px;"></div>
        </div>
        <div class="action-buttons">
            <button id="btnEnviarCliente" class="btn-action btn-equipe" onclick="enviarSimulacaoWhatsApp()"><i class="fa-solid fa-paper-plane"></i> ENVIAR PARA O CLIENTE</button>
            <a href="#" id="linkConsultor" class="btn-action btn-consultor" target="_blank"><i class="fa-solid fa-user-tie"></i> FALAR COM CONSULTOR</a>
            <a href="#" id="linkContratar" class="btn-action btn-contratar" target="_blank"><i class="fa-solid fa-cart-shopping"></i> CONTRATAR AGORA</a>
        </div>
    </div>
</div>

<script>
    let modo = 'IND';
    let isEquipe = window.location.search.includes('equipe');
    if(isEquipe) { document.getElementById('tagEquipe').style.display = 'block'; document.getElementById('btnEnviarCliente').style.display = 'flex'; }

    function switchType(type) {
        modo = type;
        document.getElementById('btnInd').classList.toggle('active', type === 'IND');
        document.getElementById('btnEmp').classList.toggle('active', type === 'EMP');
        document.getElementById('formInd').style.display = type === 'IND' ? 'block' : 'none';
        document.getElementById('formEmp').style.display = type === 'EMP' ? 'block' : 'none';
        document.getElementById('areaSimulacao').style.display = 'none';
    }

    function gerarSimulacao() {
        let nome, whats, precoFinal, capMorte, capSerit, tabelaHtml, explicacaoHtml;

        if (modo === 'IND') {
            nome = document.getElementById('nomeInd').value.trim();
            whats = document.getElementById('whatsInd').value.trim();
            let idade = document.getElementById('idadeInd').value;
            if(!nome || !whats || !idade) { alert("Preencha Nome, WhatsApp e Idade."); return; }

            const combo = document.getElementById('planoInd').value.split('|');
            capSerit = parseInt(combo[0]); capMorte = parseInt(combo[1]);
            let precoVal = ((capMorte/1000)*0.55) + ((capSerit/1000)*35) + 1.44;
            precoFinal = `R$ ${precoVal.toFixed(2)}/mês`;
            
            tabelaHtml = `<tr><td>Morte / Invalidez (IPA)</td><td class="val-destaque">R$ ${capMorte.toLocaleString('pt-BR')},00</td></tr>
                          <tr><td>Morte Acidental</td><td class="val-destaque">R$ ${(capMorte*2).toLocaleString('pt-BR')},00</td></tr>
                          <tr><td>Renda Mensal (SERIT)</td><td class="val-destaque">R$ ${capSerit.toLocaleString('pt-BR')},00</td></tr>
                          <tr><td>Carência (Morte/IPA)</td><td class="val-destaque">ISENTO</td></tr>`;
            
            explicacaoHtml = `<div class="highlight-box">
                              <b>EXEMPLO PRÁTICO SERIT (60 DIAS):</b><br>
                              Suponhamos que receba um atestado de 60 dias. A seguradora paga por dia de afastamento.<br><br>
                              Cálculo: R$ ${capSerit.toLocaleString('pt-BR')} ÷ 30 dias = R$ ${(capSerit/30).toFixed(2).replace('.',',')} p/ dia.<br>
                              Multiplicado por 53 dias pagos (descontada franquia de 7 dias).<br>
                              <b>Total Líquido a receber: R$ ${((capSerit/30)*53).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</b>.<br><br>
                              <b>CARÊNCIAS:</b> Doenças Comuns (30 dias). LER, DORT e Hérnias (180 dias). Acidente Isento.
                              </div>`;
        } else {
            nome = document.getElementById('nomeEmp').value.trim();
            whats = document.getElementById('whatsEmp').value.trim();
            let vidas = document.getElementById('vidasEmp').value;
            if(!nome || !whats || !vidas) { alert("Preencha Nome, WhatsApp e Nº de Vidas."); return; }
            if (parseInt(vidas) < 3) { alert("Mínimo de 3 vidas."); return; }

            const comboEmp = document.getElementById('planoEmp').value.split('|');
            capMorte = parseInt(comboEmp[1]);
            const valorRendaEmp = 3000;
            precoFinal = `TOTAL MENSAL: R$ ${(parseFloat(comboEmp[0]) * vidas).toFixed(2)} (${vidas} vidas)`;
            
            tabelaHtml = `<tr><td>Morte Natural</td><td class="val-destaque">R$ ${capMorte.toLocaleString('pt-BR')},00</td></tr>
                          <tr><td>IPA (Invalidez por Acidente)</td><td class="val-destaque">R$ ${capMorte.toLocaleString('pt-BR')},00</td></tr>
                          <tr><td>Morte Acidental</td><td class="val-destaque">R$ ${(capMorte*2).toLocaleString('pt-BR')},00</td></tr>
                          <tr><td>DIT Acidente (Renda Mensal)</td><td class="val-destaque">R$ ${valorRendaEmp.toLocaleString('pt-BR')},00</td></tr>
                          <tr><td>Carência (Todas Coberturas)</td><td class="val-destaque">ISENTO</td></tr>`;
            
            explicacaoHtml = `<div class="highlight-box">
                              <b>EXEMPLO PRÁTICO DIT ACIDENTE (60 DIAS):</b><br>
                              Cobre afastamentos decorrentes de <b>QUALQUER ACIDENTE</b> (24h por dia).<br><br>
                              Suponhamos um afastamento de 60 dias por acidente:<br>
                              Cálculo: R$ ${valorRendaEmp.toLocaleString('pt-BR')} ÷ 30 dias = R$ 100,00 p/ dia.<br>
                              Multiplicado por 45 dias pagos (descontada franquia de 15 dias).<br>
                              <b>Total Líquido a receber: R$ 4.500,00</b>.<br><br>
                              • <b>VANTAGEM:</b> Sem carência e proteção independente do local.<br>
                              • <b>Funeral:</b> Familiar incluso para todos os segurados.
                              </div>`;
        }

        document.getElementById('resCabecalho').innerHTML = `<h3>ESTUDO TÉCNICO UNIMED</h3><p>Para: <b>${nome}</b></p>`;
        document.getElementById('listaCoberturas').innerHTML = tabelaHtml;
        document.getElementById('resTexto').innerHTML = explicacaoHtml;
        document.getElementById('resPreco').innerText = precoFinal;
        document.getElementById('areaSimulacao').style.display = 'block';
        
        let msgPadrao = encodeURIComponent(`Olá, tenho interesse no estudo de ${nome}.`);
        document.getElementById('linkConsultor').href = `https://wa.me/5517997165139?text=${msgPadrao}`;
        document.getElementById('linkContratar').href = `https://wa.me/5517991123532?text=${msgPadrao}`;
    }

    function enviarSimulacaoWhatsApp() {
        const nome = modo === 'IND' ? document.getElementById('nomeInd').value : document.getElementById('nomeEmp').value;
        const whats = (modo === 'IND' ? document.getElementById('whatsInd').value : document.getElementById('whatsEmp').value).replace(/\D/g,'');
        const combo = (modo === 'IND' ? document.getElementById('planoInd').value : document.getElementById('planoEmp').value).split('|');
        const capMorte = parseInt(combo[1]);
        const preco = document.getElementById('resPreco').innerText;
        
        const morteX = `R$ ${capMorte.toLocaleString('pt-BR')},00`;
        const morteY = `R$ ${(capMorte*2).toLocaleString('pt-BR')},00`;

        let msg = `*EAS CORRETORA - PROTEÇÃO UNIMED*\n\n`;
        msg += `${nome}, seu estudo ficou da seguinte forma:\n\n`;
        msg += `🔹 *Morte Natural:* Indenização de *${morteX}*\n\n`;
        msg += `🔹 *Morte por Acidente:* Indenização de *${morteY}*\n\n`;
        msg += `🔹 *Invalidez por Acidente (IPA):* Indenização de *${morteX}* (cobertura 24h).\n\n`;
        msg += `🔹 *Renda p/ Afastamento (Acidente):* R$ ${(modo === 'IND' ? parseInt(combo[0]) : 3000).toLocaleString('pt-BR')},00/mês.\n\n`;
        msg += `📋 *SINISTRO:* Cálculo por dia de afastamento (franquia reduzida).\n\n`;
        msg += `⭐ *VANTAGENS:* No plano ${modo === 'IND' ? 'Individual' : 'Empresarial'} você tem Carência Zero para acidentes e morte.\n\n`;
        msg += `💰 *INVESTIMENTO:* ${preco}`;
        
        window.open(`https://wa.me/55${whats}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
