<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAS Corretora - Simulador Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #1d2d44; --gold: #b89b3e; --unimed: #00995d; --text: #334155; }
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: #ffffff; padding: 20px; }
        .logo { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--gold); margin: 0 auto 15px; display: block; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; margin: 0; font-size: 1.6rem; font-weight: 800; }
        .sub { color: var(--gold); text-align: center; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 1px; }
        .section-title { font-size: 0.9rem; font-weight: 800; color: var(--primary); margin: 25px 0 10px; border-bottom: 2px solid var(--gold); display: inline-block; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.8rem; font-weight: 700; color: #64748b; margin-bottom: 5px; }
        input, select { width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; box-sizing: border-box; background: #f8fafc; outline: none; }
        input.error { border-color: #ef4444; background-color: #fef2f2; }
        .btn-calc { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 15px; box-shadow: 0 10px 20px rgba(29, 45, 68, 0.2); }
        #areaSimulacao { display: none; margin-top: 40px; text-align: left; }
        .pdf-content { padding: 30px; border: 1px solid #eee; border-radius: 20px; background: #fff; line-height: 1.7; color: #1e293b; }
        .highlight-box { background: #f0fdf4; padding: 18px; border-radius: 12px; margin: 15px 0; border: 1px solid var(--unimed); }
        .action-buttons { display: flex; gap: 12px; margin-top: 25px; }
        .btn-action { flex: 1; padding: 18px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; font-size: 1rem; }
        .btn-pdf { background: #e2e8f0; color: var(--primary); }
        .btn-w { background: #25d366; color: white; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo oficial.jpg.png" class="logo" alt="EAS Corretora">
    <h2>EAS CORRETORA</h2>
    <div class="sub">Simulador de Proteção de Renda</div>

    <div class="form-box">
        <div class="section-title">Dados do Cliente</div>
        <div class="input-group">
            <label>Nome do Cliente</label>
            <input type="text" id="leadNome" placeholder="Nome Completo">
        </div>
        <div class="input-group">
            <label>WhatsApp do Cliente (com DDD)</label>
            <input type="tel" id="leadWhats" placeholder="(00) 00000-0000" maxlength="15">
        </div>

        <div class="section-title">Estudo Técnico</div>
        <div class="input-group">
            <label>Idade</label>
            <input type="number" id="idade" placeholder="Ex: 35">
        </div>
        <div class="input-group">
            <label>Profissão</label>
            <select id="profissao">
                <option value="Empresário / MEI">Empresário / MEI</option>
                <option value="Advogado">Advogado</option>
                <option value="Médico / Dentista">Médico / Dentista</option>
                <option value="Outras Profissões">Outras Profissões</option>
            </select>
        </div>
        <div class="input-group">
            <label>Benefício Desejado</label>
            <select id="beneficio">
                <option value="3000">R$ 3.000,00</option>
                <option value="6000">R$ 6.000,00</option>
                <option value="9000" selected>R$ 9.000,00</option>
            </select>
        </div>
        <div class="input-group">
            <label>Cupom de Desconto</label>
            <input type="text" id="cupom" placeholder="Ex: EAS">
        </div>

        <button class="btn-calc" onclick="gerarEstudo()">GERAR ESTUDO CONSULTIVO</button>
    </div>

    <div id="areaSimulacao">
        <div id="pdfArea" class="pdf-content">
            <div style="text-align:center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px;">
                <h3 style="color:var(--primary); margin:0; text-transform:uppercase;">Estudo Técnico Personalizado</h3>
                <p style="margin:5px 0;">Preparado exclusivamente para: <b id="outNome"></b></p>
            </div>
            <div id="corpoTexto"></div>
            <div style="text-align:right; font-weight:800; color:var(--primary); font-size:1.4rem; border-top: 2px solid #eee; padding-top:15px; margin-top:20px;">
                INVESTIMENTO: <span id="outPremio" style="color:var(--unimed)"></span>
            </div>
            <div style="text-align:center; margin-top: 30px; font-size: 0.8rem; color: #94a3b8; border-top: 1px dashed #eee; padding-top: 10px;">
                <b>EAS Corretora de Seguros</b> | Emerson: (17) 99716-5139
            </div>
        </div>
        <div class="action-buttons">
            <button class="btn-action btn-pdf" onclick="baixarPDF()"><i class="fa-solid fa-file-pdf"></i> SALVAR PROPOSTA</button>
            <a href="#" id="linkWhats" class="btn-action btn-w" target="_blank"><i class="fa-brands fa-whatsapp"></i> ENVIAR WHATSAPP</a>
        </div>
    </div>
</div>

<script>
    const telInput = document.getElementById('leadWhats');
    
    // Máscara e trava de input
    telInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, ''); // Remove tudo que não é número
        if (value.length > 11) value = value.slice(0, 11); // Trava em 11 dígitos se inventar número
        
        let x = value.match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        
        if(value.length === 11) telInput.classList.remove('error');
    });

    function gerarEstudo() {
        const nome = document.getElementById('leadNome').value;
        const whatsRaw = telInput.value.replace(/\D/g, '');
        const idade = document.getElementById('idade').value;
        const benef = parseInt(document.getElementById('beneficio').value);
        const prof = document.getElementById('profissao').value;
        const cupom = document.getElementById('cupom').value.trim().toUpperCase();

        // VALIDAÇÃO RIGOROSA
        if(!nome || nome.length < 3) return alert("Por favor, digite o nome completo do cliente.");
        if(whatsRaw.length !== 11) {
            telInput.classList.add('error');
            return alert("Número de WhatsApp inválido! Digite os 11 dígitos (DDD + 9 + Número).");
        }
        if(!idade) return alert("Informe a idade.");

        const cap = (benef === 9000) ? 100000 : (benef === 6000 ? 60000 : 30000);
        const diaria = (benef / 30);
        const total53 = (diaria * 53);
        const pPadrao = { 3000: 120.79, 6000: 240.15, 9000: 340.00 };
        const pPromo = { 3000: 74.05, 6000: 148.12, 9000: 211.30 };
        const valorFinal = (cupom === "EAS") ? pPromo[benef] : pPadrao[benef];

        document.getElementById('outNome').innerText = nome;
        document.getElementById('outPremio').innerText = `R$ ${valorFinal.toFixed(2)}/mês`;

        let textoHtml = `
            <p>Se ocorrer <b>morte natural</b> a seguradora pagará uma indenização no valor de <b>R$ ${cap.toLocaleString('pt-BR')},00</b>.</p>
            <p>Se ocorrer <b>morte por acidente</b>, a Seguros Unimed pagará uma indenização no valor de <b>R$ ${(cap*2).toLocaleString('pt-BR')},00</b>.</p>
            <p>Se ocorrer uma <b>invalidez por acidente ou doença</b> a Seguros Unimed pagará uma indenização no valor de <b>R$ ${cap.toLocaleString('pt-BR')},00</b>.</p>
            <p><b>SERIT:</b> Se você precisar ficar afastado por mais de 7 dias, a Seguros Unimed pagará uma renda de <b>R$ ${benef.toLocaleString('pt-BR')},00 mensais</b>.</p>
            <div class="highlight-box">
                <b>EXEMPLO PRÁTICO (60 DIAS):</b><br>
                Diária: R$ ${diaria.toFixed(2).replace('.',',')}.<br>
                Pagamento: 53 dias (descontada franquia de 7 dias).<br>
                <b>Indenização: R$ ${total53.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</b>.
            </div>
            <p><b>CARÊNCIAS:</b> Doenças comuns (30 dias). LER, DORT, LTC, Doenças Progressivas, Degenerativas e Hérnias (180 dias). Acidente não tem carência.</p>
        `;

        if(prof === 'Médico / Dentista') {
            textoHtml = `<p style="color:var(--unimed); font-weight:bold; border: 1px solid var(--unimed); padding: 12px; border-radius: 10px; text-align:center; margin-bottom: 20px;">✓ Categoria com Dispensa de Comprovação de Renda</p>` + textoHtml;
        }

        document.getElementById('corpoTexto').innerHTML = textoHtml;
        const msgWhats = `*EAS CORRETORA*\nOlá ${nome}, segue resumo:\nRenda: R$ ${benef.toLocaleString('pt-BR')}\nExemplo 60 dias: R$ ${total53.toLocaleString('pt-BR')}\nPrêmio: R$ ${valorFinal.toFixed(2)}/mês`;
        document.getElementById('linkWhats').href = `https://wa.me/55${whatsRaw}?text=${encodeURIComponent(msgWhats)}`;
        document.getElementById('areaSimulacao').style.display = "block";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function baixarPDF() {
        const element = document.getElementById('pdfArea');
        const nome = document.getElementById('leadNome').value;
        html2pdf().set({ margin: 15, filename: `Estudo_EAS_${nome}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(element).save();
    }
</script>
</body>
</html>
